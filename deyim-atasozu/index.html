<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deyim & Atasözü Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e17;--accent:#f7b731;--accent2:#e84393;--text:#fffffe;--muted:#a7a9be;--deyim:#7b61ff;--atasoz:#00c9a7;--r:20px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(123,97,255,.12) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,201,167,.10) 0%,transparent 70%);pointer-events:none}
header{text-align:center;margin-bottom:32px}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;letter-spacing:-.5px}
header h1 .d{color:var(--deyim)} header h1 .a{color:var(--atasoz)}
.sub{color:var(--muted);font-size:.9rem;margin-top:6px}
#counter{font-size:.95rem;color:var(--muted);margin-bottom:16px;font-weight:600;letter-spacing:1px}
.scene{width:min(480px,100%);height:300px;perspective:1000px;cursor:pointer;margin-bottom:20px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);border-radius:var(--r)}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px;border:1.5px solid rgba(255,255,255,.06)}
.front{background:linear-gradient(145deg,#1e1c2e 0%,#13111f 100%);box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}
.back{background:linear-gradient(145deg,#0d1b3e 0%,#0a1628 100%);transform:rotateY(180deg);box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}
.badge{position:absolute;top:16px;left:20px;font-size:.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:50px}
.bd{background:rgba(123,97,255,.18);color:var(--deyim);border:1px solid rgba(123,97,255,.3)}
.ba{background:rgba(0,201,167,.15);color:var(--atasoz);border:1px solid rgba(0,201,167,.3)}
.hint{position:absolute;bottom:14px;right:18px;font-size:.68rem;color:rgba(255,255,255,.2);font-weight:600;letter-spacing:.5px}
.ctitle{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3.5vw,1.75rem);font-weight:700;text-align:center;line-height:1.35}
.cex{margin-top:18px;font-size:.88rem;color:var(--muted);text-align:center;font-style:italic;line-height:1.6;border-top:1px solid rgba(255,255,255,.06);padding-top:14px;max-width:380px}
.cex em.h{color:var(--accent);font-style:normal;font-weight:700}
.albl{font-size:.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.cmean{font-size:clamp(.92rem,2.5vw,1.1rem);text-align:center;line-height:1.65;color:#d4d7f5;font-weight:600}
#nextBtn{display:none;margin-top:4px;background:linear-gradient(135deg,var(--deyim),var(--accent2));color:#fff;border:none;padding:14px 40px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 8px 24px rgba(123,97,255,.35);transition:transform .15s,box-shadow .15s;animation:fup .3s ease}
#nextBtn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(123,97,255,.5)}
@keyframes fup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#done{display:none;flex-direction:column;align-items:center;gap:16px;text-align:center}
#done h2{font-family:'Playfair Display',serif;font-size:2rem;color:var(--accent)}
#done p{color:var(--muted);font-size:1rem}
#restartBtn{background:linear-gradient(135deg,var(--atasoz),#009f85);color:#0f0e17;border:none;padding:13px 36px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(0,201,167,.3);transition:transform .15s}
#restartBtn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<header>
  <h1><span class="d">Deyim</span> & <span class="a">Atasözü</span></h1>
  <p class="sub">Kartı tıkla → anlamını gör</p>
</header>
<div id="counter"></div>
<div class="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face front">
      <span class="badge" id="tb1"></span>
      <div class="ctitle" id="ctitle"></div>
      <div class="cex" id="cex"></div>
      <span class="hint">tıkla ↩</span>
    </div>
    <div class="face back">
      <span class="badge" id="tb2"></span>
      <div class="albl">ANLAMI</div>
      <div class="cmean" id="cmean"></div>
    </div>
  </div>
</div>
<button id="nextBtn" onclick="nextCard()">Sonraki Kart →</button>
<div id="done">
  <h2>🎉 Tebrikler!</h2>
  <p id="doneMsg"></p>
  <button id="restartBtn" onclick="restart()">Baştan Başla</button>
</div>

{t:"deyim",s:"Tabanları yağlamak",m:"Kaçmak, sıvışmak.",e:"İş ağırlaşınca <em class='h'>tabanları yağladı</em>."},
{t:"deyim",s:"Tadını çıkarmak",m:"Bir şeyden en iyi biçimde yararlanmak, keyfini sürmek.",e:"Tatili sonuna kadar <em class='h'>tadını çıkardılar</em>."},
{t:"deyim",s:"Taş çıkarmak",m:"Birini geride bırakmak, üstün gelmek.",e:"Bu işte herkesin <em class='h'>taşını çıkarır</em>."},
{t:"deyim",s:"Taş üstüne taş koymak",m:"Bir şeye katkıda bulunmak, inşa etmek.",e:"Bu şirketi <em class='h'>taş üstüne taş koyarak</em> büyüttük."},
{t:"deyim",s:"Tef çalmak",m:"Gıybet etmek, başkalarını çekiştirmek.",e:"Oturup arkamızdan <em class='h'>tef çalıyorlar</em>."},
{t:"deyim",s:"Tepesi atmak",m:"Çok sinirlenip taşmak.",e:"O konuşunca <em class='h'>tepesi attı</em>."},
{t:"deyim",s:"Tepeden tırnağa",m:"Baştan ayağa, tamamen.",e:"<em class='h'>Tepeden tırnağa</em> ıslak oldu."},
{t:"deyim",s:"Tereyağından kıl çeker gibi",m:"Çok kolayca, hiç zorlanmadan.",e:"O soruyu <em class='h'>tereyağından kıl çeker gibi</em> çözdü."},
{t:"deyim",s:"Topu taca atmak",m:"Sorumluluğu başkasına yıkmak.",e:"Soruları cevaplamak yerine <em class='h'>topu taca attı</em>."},
{t:"deyim",s:"Toz kondurmamak",m:"Birini ya da bir şeyi çok koruyup kusursuz saymak.",e:"Çocuğuna kimse <em class='h'>toz konduramaz</em>."},
{t:"deyim",s:"Toz pembe görmek",m:"Gerçekçi olmayan biçimde iyimser olmak.",e:"Her şeyi <em class='h'>toz pembe</em> görüyor."},
{t:"deyim",s:"Tüyleri diken diken olmak",m:"Korku ya da heyecanla ürpermek.",e:"O sesi duyunca <em class='h'>tüylerim diken diken oldu</em>."},
{t:"deyim",s:"Tuzlu su içirmek",m:"Birini çok zarara uğratmak.",e:"Aldatıcı sözlerine inandım ve bana <em class='h'>tuzlu su içirdiler</em>."},
// ─── DEYİMLER U-Ü-V-Y-Z ───
{t:"deyim",s:"Ufku açık olmak",m:"Geniş düşünceli, ileri görüşlü olmak.",e:"<em class='h'>Ufku açık</em> insanlar yeniliklere kolayca uyum sağlar."},
{t:"deyim",s:"Ummadık taş baş yarar",m:"Beklenmedik bir kimseden zarar gelmek.",e:"En güvendiği kişi onu anlattı; gerçekten <em class='h'>ummadık taş baş yarar</em>."},
{t:"deyim",s:"Üstüne tuz biber ekmek",m:"Birisinin acısını daha da artırmak.",e:"Bir de böyle söyleyerek <em class='h'>üstüne tuz biber ekti</em>."},
{t:"deyim",s:"Vakit kazanmak",m:"Oyalayarak zaman kazanmak.",e:"Soruyu cevaplamaktan kaçınarak <em class='h'>vakit kazanmaya</em> çalıştı."},
{t:"deyim",s:"Yaka paça etmek",m:"Zorla götürmek ya da birine sert davranmak.",e:"Tartışma büyüyünce onu <em class='h'>yaka paça etti</em>."},
{t:"deyim",s:"Yakasını bırakmamak",m:"Peşini bırakmamak, sürekli rahatsız etmek.",e:"<em class='h'>Yakamı bırakmıyor</em>, her gün arıyor."},
{t:"deyim",s:"Yedi düvele beddua etmek",m:"Herkese kızıp bağırmak.",e:"Sinirlenince <em class='h'>yedi düvele beddua etti</em>."},
{t:"deyim",s:"Yel gibi geçmek",m:"Çok hızlı geçip gitmek.",e:"Yaz tatili <em class='h'>yel gibi geçti</em>."},
{t:"deyim",s:"Yere göğe sığdıramamak",m:"Birini aşırı övmek.",e:"Oğlunu <em class='h'>yere göğe sığdıramıyor</em>."},
{t:"deyim",s:"Yolunu gözlemek",m:"Birisinin gelmesini sabırsızlıkla beklemek.",e:"Annen saatlerdir senin <em class='h'>yolunu gözlüyor</em>."},
{t:"deyim",s:"Yürek dağlamak",m:"Çok üzmek, acı vermek.",e:"O haber <em class='h'>yürek dağladı</em>."},
{t:"deyim",s:"Yüreği oynamak",m:"Heyecan ya da korku hissetmek.",e:"Söylenecekleri beklerken <em class='h'>yüreği oynadı</em>."},
{t:"deyim",s:"Yüzü gülmek",m:"Mutlu ve neşeli görünmek.",e:"Uzun süreden sonra nihayet <em class='h'>yüzü güldü</em>."},
{t:"deyim",s:"Yüzü kızarmak",m:"Utanmak.",e:"Sorunun cevabını bilemeyince <em class='h'>yüzü kızardı</em>."},
{t:"deyim",s:"Yüzüne vurmak",m:"Birine yaptığı hatayı yüzüne söylemek.",e:"Herkesin içinde hatasını <em class='h'>yüzüne vurdu</em>."},
{t:"deyim",s:"Yüz vermek",m:"Birine gereğinden fazla yakınlık ve izin göstermek.",e:"Çocuğa fazla <em class='h'>yüz verme</em>, sonra başa çıkamazsın."},
{t:"deyim",s:"Zehir gibi",m:"Çok keskin, akıllı veya acı.",e:"<em class='h'>Zehir gibi</em> bir zekâsı var."},
{t:"deyim",s:"Zıvanadan çıkmak",m:"Çok sinirlenip kendine hâkim olamamak.",e:"Sabır taşı çatlayınca <em class='h'>zıvanadan çıktı</em>."},
{t:"deyim",s:"Zamana bırakmak",m:"Bir sorunu çözmek için zaman geçmesini beklemek.",e:"Bu konuyu <em class='h'>zamana bırakmak</em> en doğrusu."},
// ─── DEYİMLER EK ───
{t:"deyim",s:"Ağzına parmak tıkamak",m:"Birinin söylemesini önlemek, susturmak.",e:"Söyleyeceğini anlayınca <em class='h'>ağzına parmak tıkadı</em>."},
{t:"deyim",s:"Dört köşe olmak",m:"Çok mutlu ve memnun olmak.",e:"Haberi alınca <em class='h'>dört köşe oldu</em>."},
{t:"deyim",s:"Eli açık olmak",m:"Cömert olmak.",e:"O çok <em class='h'>eli açık</em> biridir, kimseyi eli boş göndermez."},
{t:"deyim",s:"Eli sıkı olmak",m:"Cimri olmak.",e:"<em class='h'>Eli sıkı</em> olduğu için kimseyle para işine girmiyor."},
{t:"deyim",s:"Göz boyamak",m:"Gerçekte olmayan bir iyiliği, çalışmayı göstermek.",e:"Patronun önünde <em class='h'>göz boyayarak</em> masum görünmeye çalıştı."},
{t:"deyim",s:"Kabak tadı vermek",m:"Çok tekrar edildiği için sıkmak.",e:"Aynı şakayı sürekli yapıyor, artık <em class='h'>kabak tadı verdi</em>."},
{t:"deyim",s:"Kan kusturmak",m:"Birini çok ezmek, çok fazla sıkıntı vermek.",e:"Verdiği ödevlerle öğrencilere <em class='h'>kan kustururdu</em>."},
{t:"deyim",s:"Kara kara düşünmek",m:"Karamsar, umutsuz bir şekilde düşünmek.",e:"Günlerce <em class='h'>kara kara düşündü</em>."},
{t:"deyim",s:"Lokma gibi yutmak",m:"Söyleneni hiç itiraz etmeden kabul etmek.",e:"Her yalanı <em class='h'>lokma gibi yuttu</em>."},
{t:"deyim",s:"Malını mülkünü yemek",m:"Varını yoğunu tüketmek.",e:"Kumar oynaya oynaya <em class='h'>malını mülkünü yedi</em>."},
{t:"deyim",s:"Pişmanlık duymak",m:"Yaptığı bir şeyden dolayı içten üzüntü hissetmek.",e:"Verdiği karardan derin <em class='h'>pişmanlık duydu</em>."},
{t:"deyim",s:"Sinirden çıldırmak",m:"Çok sinirlenip kontrolü yitirmek.",e:"Bu bekleyiş beni <em class='h'>sinirden çıldırtıyor</em>."},
{t:"deyim",s:"Söz dinlemek",m:"Büyüklerin söylediklerine uymak.",e:"<em class='h'>Söz dinleyen</em> çocuk her zaman ödüllendirilir."},
{t:"deyim",s:"Zorla güzellik olmaz",m:"Sevgi ve gönüllülük zorla sağlanamaz.",e:"<em class='h'>Zorla güzellik olmaz</em>, kabul etmek zorunda değilim."},

// ══════════════════════════════════════════════════════
// ATASÖZÜ A
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"Abanın kadri yağmurda bilinir.",m:"Bir şeyin gerçek değeri, ona çok ihtiyaç duyulduğunda anlaşılır."},
{t:"atasoz",s:"Ağaç yaşken eğilir.",m:"İnsan küçükken terbiye ve alışkanlık kazanır; büyüyünce değişmesi zorlaşır."},
{t:"atasoz",s:"Akıl yaşta değil, baştadır.",m:"Zeki olmak yaşla değil, kişinin anlayışıyla ölçülür."},
{t:"atasoz",s:"Alışkanlık ikinci bir tabiat olur.",m:"Bir şeye alışan, onu doğal ihtiyacı gibi hisseder."},
{t:"atasoz",s:"Araba devrilince yol gösteren çok olur.",m:"İş olduktan sonra akıl veren çok çıkar; asıl gereken önceden uyarmaktır."},
{t:"atasoz",s:"Armut piş ağzıma düş.",m:"Emek harcamadan her şeyin hazır gelmesini beklemek."},
{t:"atasoz",s:"Aslan yattığı yerden belli olur.",m:"Büyük insanların bulundukları yer de büyük ve değerli olur."},
{t:"atasoz",s:"Ateş olmayan yerden duman çıkmaz.",m:"Her söylentinin, her belirtinin arkasında bir gerçek vardır."},
{t:"atasoz",s:"Az tamah çok ziyan.",m:"Açgözlülük sonunda büyük kayba yol açar."},
{t:"atasoz",s:"Ayağını yorganına göre uzat.",m:"Harcamalarını gelirine, isteğini imkânına göre ayarla."},
{t:"atasoz",s:"Adam adama lazım.",m:"İnsanlar her zaman birbirine ihtiyaç duyar."},
{t:"atasoz",s:"Aç it fırın deler.",m:"Açlık ya da şiddetli ihtiyaç insanı her şeye iter."},
{t:"atasoz",s:"Ak akçe kara gün içindir.",m:"Biriken para, sıkıntılı günler için saklanır."},
// ══════════════════════════════════════════════════════
// ATASÖZÜ B
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"Baca eğri de olsa dumanı doğru çıkar.",m:"İyi huylu, dürüst biri olumsuz ortamdan etkilense de doğruluğunu korur."},
{t:"atasoz",s:"Bal bal demekle ağız tatlanmaz.",m:"Söz söylemek yetmez; asıl olan gerçekleştirmektir."},
{t:"atasoz",s:"Balık baştan kokar.",m:"Bir kuruluşta bozulma, başındakilerden kaynaklanır."},
{t:"atasoz",s:"Bedava sirke baldan tatlıdır.",m:"Masrafsız elde edilen şey, değeri ne olursa olsun hoş gelir."},
{t:"atasoz",s:"Bindiğin dalı kesme.",m:"Sana destek olanı ya da bağlı olduğun şeye zarar verme."},
{t:"atasoz",s:"Bir el bir eli yıkar, iki el yüzü yıkar.",m:"İnsanlar birbirine yardım etmeli; dayanışmayla daha büyük işler yapılır."},
{t:"atasoz",s:"Bir musibet bin nasihatten yeğdir.",m:"Yaşanmış bir felaket, binlerce öğütten daha iyi ders verir."},
{t:"atasoz",s:"Borçlu herkesin kölesidir.",m:"Borçlu olan kişi özgür hareket edemez, başkasına muhtaçtır."},
{t:"atasoz",s:"Bülbülü altın kafese koymuşlar, yine de vatanını istemiş.",m:"İnsan ne kadar rahat olsa da vatan sevgisini unutmaz."},
{t:"atasoz",s:"Bin ölç bir biç.",m:"Karar vermeden önce çok düşünmek gerekir."},
// ══════════════════════════════════════════════════════
// ATASÖZÜ C-Ç
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"Can boğazdan gelir.",m:"Sağlıklı kalmak için iyi beslenmek önemlidir; yemeden yaşanmaz."},
{t:"atasoz",s:"Can çıkmayınca huy çıkmaz.",m:"İnsanı alışkanlıklarından vazgeçirmek çok zordur."},
{t:"atasoz",s:"Cennet ucuz değil, cehennem de boş değil.",m:"İyilik bedelsiz gelmez, kötülük de cezasız kalmaz."},
{t:"atasoz",s:"Çalma elin kapısını, çalarlar kapını.",m:"Başkasına kötülük yapma; aynısı sana da yapılır."},
{t:"atasoz",s:"Çivi çiviyi söker.",m:"Bir kötülüğü bazen ancak onun gibisiyle gidermek mümkündür."},
{t:"atasoz",s:"Çukur kazan çukura düşer.",m:"Başkasına tuzak kuran, o tuzağa kendi düşer."},
// ══════════════════════════════════════════════════════
// ATASÖZÜ D
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"Dağ dağa kavuşmaz, insan insana kavuşur.",m:"İnsanlar arasındaki buluşma kaçınılmazdır."},
{t:"atasoz",s:"Damlaya damlaya göl olur.",m:"Küçük birikimlerin zamanla büyük sonuçlar doğurduğu anlatılır."},
{t:"atasoz",s:"Denize düşen yılana sarılır.",m:"Çok zor durumda kalan biri her çareye baş vurur."},
{t:"atasoz",s:"Dereyi görmeden paçaları sıvama.",m:"İşin zorluğunu bilmeden hazırlıksız davranma."},
{t:"atasoz",s:"Doğru söyleyeni dokuz köyden kovarlar.",m:"Gerçeği söylemek çoğu zaman tepki görür."},
{t:"atasoz",s:"Dost acı söyler.",m:"Gerçek dost, sana iyi gelmesi için gerçeği söyler; tatlı yalan söylemez."},
{t:"atasoz",s:"Dost başa, düşman ayağa bakar.",m:"Dost seni güçlü kılmak ister; düşman zayıf düşürmek."},
{t:"atasoz",s:"Dost dostu sıkışmış yerde ister.",m:"Gerçek dost, zor günde yanında olan kişidir."},
{t:"atasoz",s:"Düşme komşunun haline, düşersin sen de o hale.",m:"Başkasının kötü durumuna gülme; aynısı sana da olabilir."},
{t:"atasoz",s:"Dost ile ye iç, alışveriş etme.",m:"Dost ile ticaret yapmak ilişkiyi bozabilir."},
// ══════════════════════════════════════════════════════
// ATASÖZÜ E
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"El elden üstündür.",m:"Her güçlünün üstünde daha güçlüsü vardır."},
{t:"atasoz",s:"Emeksiz yemek olmaz.",m:"Karşılıksız, çabasız bir kazanç elde edilemez."},
{t:"atasoz",s:"Erken kalkan yol alır.",m:"Zamanlı ve erken başlayan, başarıya daha çabuk ulaşır."},
{t:"atasoz",s:"Eşek hoşaftan ne anlar.",m:"Kaba ve anlayışsız biri ince şeylerin değerini bilemez."},
{t:"atasoz",s:"Etle tırnak arasına girilmez.",m:"Çok yakın bağ olan kişilerin arasına girmek yanlıştır."},
{t:"atasoz",s:"Etme bulma dünyası.",m:"Yaptığın kötülük eninde sonunda sana döner."},
{t:"atasoz",s:"Ev alma komşu al.",m:"İyi komşu, iyi ev kadar önemlidir."},
{t:"atasoz",s:"Eti senin kemiği benim.",m:"Çocuğun eğitimi için her türlü cezaya razı olma ifadesi."},
{t:"atasoz",s:"Eski dost düşman olmaz.",m:"Gerçek dost bozuşsalar bile düşmanlık yapmaz."},
// ══════════════════════════════════════════════════════
// ATASÖZÜ G-H
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"Geç olsun güç olmasın.",m:"Bir şeyin gecikmesi, yarım ya da kötü yapılmasından iyidir."},
{t:"atasoz",s:"Gelen geçer, konan göçer.",m:"Hiçbir şey kalıcı değildir; her şey gelip geçer."},
{t:"atasoz",s:"Gönül ne kahve ister ne kahvehane, gönül sohbet ister.",m:"İnsanın ihtiyacı maddi şeyler değil, samimi ilgi ve sohbettir."},
{t:"atasoz",s:"Güneş balçıkla sıvanmaz.",m:"Apaçık gerçekler gizlenemez."},
{t:"atasoz",s:"Gülü seven dikenine katlanır.",m:"Sevdiğin şeyin güçlüklerine de razı olmak gerekir."},
{t:"atasoz",s:"Her şeyin fazlası zarar.",m:"Aşırıya kaçmak daima zararlıdır."},
{t:"atasoz",s:"Her yiğidin bir yoğurt yiyişi vardır.",m:"Herkesin kendine özgü bir yöntemi ve tarzı vardır."},
{t:"atasoz",s:"Her laf her yerde söylenmez.",m:"Ortama ve koşula uygun konuşmak gerekir."},
{t:"atasoz",s:"Her kapıdan çıkan mülkünden çıkar.",m:"Herkesle iş tutanın işleri zamanla bozulur."},
{t:"atasoz",s:"Horozu çok olan köyün sabahı geç olur.",m:"Herkesin söz sahibi olduğu yerde iş geç ilerler."},
// ══════════════════════════════════════════════════════
// ATASÖZÜ İ-K
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"İki cambaz bir ipte oynamaz.",m:"Aynı alanda iki güçlü rakip birlikte barınamaz."},
{t:"atasoz",s:"İki gönül bir olunca samanlık seyran olur.",m:"Sevgi ve uyum olduğunda en sıradan yer bile güzel görünür."},
{t:"atasoz",s:"İnsan insanın kurdudur.",m:"İnsanlar zaman zaman birbirlerine en büyük kötülüğü yaparlar."},
{t:"atasoz",s:"İşi ehline ver.",m:"Her iş, o konuda uzman olan birine yaptırılmalıdır."},
{t:"atasoz",s:"İşleyen demir pas tutmaz.",m:"Sürekli çalışan, kendini geliştiren eskimez ve güçlü kalır."},
{t:"atasoz",s:"İt ürür, kervan yürür.",m:"Karşı çıkmaların önemi yoktur; asıl olan işi sürdürmektir."},
{t:"atasoz",s:"İyilik et denize at, balık bilmezse Hâlik bilir.",m:"İyilik yap, karşılığını beklemeden; Allah görür."},
{t:"atasoz",s:"İnsanı seven insanı bulur.",m:"Sevgi gösterenin yanında onu seven insanlar belirir."},
{t:"atasoz",s:"İyi at yem ister.",m:"İyi insanlar da iyi koşullarda tutulmalıdır."},
{t:"atasoz",s:"Kanaatkâr olan zengindir.",m:"Az ile yetinip şükredebilen insan gerçek zenginliğe kavuşur."},
{t:"atasoz",s:"Karga kargaya kara demez.",m:"Birbirine benzeyen insanlar birbirini kusurlu bulmaz."},
{t:"atasoz",s:"Kaz gelen yerden tavuk esirgemez.",m:"Büyük çıkar elde etmek için küçük fedakarlık yapılır."},
{t:"atasoz",s:"Kedi uzanamadığı ciğere pis der.",m:"İnsan ulaşamadığı şeyi küçümser."},
{t:"atasoz",s:"Kendi düşen ağlamaz.",m:"Kendi hatasıyla başına bela getirenin şikâyet hakkı yoktur."},
{t:"atasoz",s:"Komşu komşunun külüne muhtaçtır.",m:"İnsanlar küçük şeyler için bile birbirine muhtaçtır."},
{t:"atasoz",s:"Körle yatan şaşı kalkar.",m:"Kötü arkadaşlık insanı olumsuz etkiler."},
{t:"atasoz",s:"Kötü haber tez duyulur.",m:"Kötü haberler çok hızlı yayılır."},
{t:"atasoz",s:"Kurtla dost olana koyun sürüsü emanet edilmez.",m:"Güvenilmez biriyle ortaklık ya da iş yapılmaz."},
{t:"atasoz",s:"Kötülük eden kötülük bulur.",m:"Yaptığın kötülüğün karşılığını görürsün."},
{t:"atasoz",s:"Körün istediği bir gözdür.",m:"Gerçekten muhtaç olan, az ile yetinir."},
{t:"atasoz",s:"Kaç gün olur kış yaz olmaz.",m:"Her sıkıntının bir sonu vardır."},
// ══════════════════════════════════════════════════════
// ATASÖZÜ L-M-N
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"Lafla peynir gemisi yürümez.",m:"Söz söylemek yetmez; iş yapmak gerekir."},
{t:"atasoz",s:"Laf dinleyen az iş çeker.",m:"Uyarıları dinleyen, gereksiz sıkıntılardan kaçınır."},
{t:"atasoz",s:"Mal canın yongasıdır.",m:"İnsan sevdiği şeylerden kolay kolay vazgeçmez."},
{t:"atasoz",s:"Mazlumun âhı yerde kalmaz.",m:"Haksızlığa uğrayanın bedduası mutlaka karşılık bulur."},
{t:"atasoz",s:"Meyve veren ağacı taşlarlar.",m:"Değerli ve verimli olan her zaman eleştiriye maruz kalır."},
{t:"atasoz",s:"Minareyi çalan kılıfını hazırlar.",m:"Büyük bir yanlış yapan kişi, sonuçlardan kurtulmanın yolunu önceden düşünür."},
{t:"atasoz",s:"Misafir umduğunu değil, bulduğunu yer.",m:"Misafir olan, ev sahibinin sunduğuyla yetinmeli."},
{t:"atasoz",s:"Mühür kimde ise Süleyman odur.",m:"En yetkili olan kişi, söz ve karar sahibidir."},
{t:"atasoz",s:"Mum dibine ışık vermez.",m:"Kişi çevresindeki sorunu görmez; dışarıya yardım ederken yakınına etmez."},
{t:"atasoz",s:"Ne ekersen onu biçersin.",m:"Yaptıklarının karşılığını görürsün."},
{t:"atasoz",s:"Ne kadar tatlı olursan ol, seni yutmasınlar.",m:"İyi ve nazik olurken saf olmamak gerekir."},
{t:"atasoz",s:"Nerede birlik, orada dirlik.",m:"Bir arada uyum içinde yaşamak huzur ve güç getirir."},
{t:"atasoz",s:"Niyet hayır, akıbet hayır.",m:"İyi niyetle başlayan, iyi sonuçla biter."},

// ATASÖZÜ O-Ö-P
// ══════════════════════════════════════════════════════
{t:"atasoz",s:"Ot kökü üstünde biter.",m:"Çocuk, ailesinin etkisini taşır; çevresi ona şekil verir."},
{t:"atasoz",s:"Öfke ile kalkan zarar ile oturur.",m:"Öfkeyle atılan adımlar pişmanlıkla sonuçlanır."},
{t:"atasoz",s:"Öğrenmek için hiçbir zaman geç değil.",m:"Her yaşta yeni şeyler öğrenilebilir."},
{t:"atasoz",s:"Örümcek kendi ağını sever.",m:"Herkes kendi yaptığına değer verir."},
{t:"atasoz",s:"Para parayı çeker.",m:"Zenginlik zenginliği artırır; sermayesi olan daha çok kazanır."},
{t:"atasoz",s:"Parayı veren düdüğü çalar.",m:"Para ve güç sahibi olan, dilediğini yaptırabilir."},
{t:"atasoz",s:"Perşembenin gelişi çarşambadan belli olur.",m:"Bir işin sonucu, daha başından bellidir."},
{t:"atasoz",s:"Pişmanlık gideni geri getirmez.",m:"Yapılan bir hatanın ardından pişman olmak geri dönüşü sağlamaz."},

{t:"atasoz",s:"Sabır acıdır ama meyvesi tatlıdır.",m:"Sabırlı olmak zordur; ancak sonunda mutlu bir sonuç verir."},
{t:"atasoz",s:"Sabreden derviş muradına ermiş.",m:"Sabırla bekleyen sonunda amacına ulaşır."},
{t:"atasoz",s:"Sabahın seyrini akşam yap.",m:"İşleri vaktinde yap; ertelemek sorun yaratır."},
{t:"atasoz",s:"Sakla samanı gelir zamanı.",m:"Her şeyi ileride işe yarayacak diye saklayan akıllı davranmış olur."},
{t:"atasoz",s:"Saman altından su yürütmek.",m:"Görünürde sakin kalırken gizlice iş çevirmek."},
{t:"atasoz",s:"Söz gümüşse sükût altındır.",m:"Konuşmak iyi olsa da susmasını bilmek daha değerlidir."},
{t:"atasoz",s:"Su testisi su yolunda kırılır.",m:"Bir işi amaç edinen kişi, o yolda tehlikeye bile girebilir."},

{t:"atasoz",s:"Taş yerinde ağırdır.",m:"Her şey kendi yerinde değerlidir."},
{t:"atasoz",s:"Tanrı versin deyip geçme.",m:"Başkasının sıkıntısına seyirci kalmak yetmez; elinden geleni yap."},
{t:"atasoz",s:"Tatmayan bilmez.",m:"Bir şeyin gerçek değerini bizzat yaşayanlar anlar."},
{t:"atasoz",s:"Tatlı dil yılanı deliğinden çıkarır.",m:"Güzel ve tatlı sözler, en inatçı insanı bile yumuşatabilir."},
{t:"atasoz",s:"Temiz el daima temiz kalır.",m:"Dürüst davranan, lekeli olmaz."},
{t:"atasoz",s:"Testi kırılınca değeri bilinir.",m:"Kaybedilen şeyin kıymeti anlaşılır."},
{t:"atasoz",s:"Ucuz etin yahnisi yavan olur.",m:"Kaliteli olmayan şeyden iyi sonuç beklenmez."},
{t:"atasoz",s:"Umut fakirin ekmeğidir.",m:"Umutsuz insan yaşayamaz; umut, en yoksulun besini gibidir."},
{t:"atasoz",s:"Uyanık olana kimse tuzak kuramaz.",m:"Dikkatli ve temkinli davranan kandırılamaz."},
{t:"atasoz",s:"Uyumayan düşman uyuyan dostu geçer.",m:"Tembel ve dikkatsiz biri, uyanık düşmanına yenik düşer."},
{t:"atasoz",s:"Üzüm üzüme baka baka kararır.",m:"İnsan içinde bulunduğu çevreden etkilenir."},
{t:"atasoz",s:"Vaktinde bir iğne, sonradan bir çuval çuvaldız.",m:"Zamanında yapılan küçük bir iş, sonradan büyük zahmetten kurtarır."},
{t:"atasoz",s:"Vakitsiz öten horozun başı kesilir.",m:"Zamanı ve yeri gelmeden yapılan iş zarar getirir."},
{t:"atasoz",s:"Veren el alan elden üstündür.",m:"Bağış yapan, alan kişiden daha onurlu bir konumdadır."},

{t:"atasoz",s:"Yalancının mumu yatsıya kadar yanar.",m:"Yalan söyleyenin durumu geçici iyi görünse de sonunda ortaya çıkar."},

{t:"atasoz",s:"Yiğidin alnına yazılan silinmez.",m:"Kader kaçınılmazdır."},

{t:"atasoz",s:"Yorgun öküze tosbağa da yük olur.",m:"Zaten yorgun ve bitkin olan birine en küçük yük bile ağır gelir."},
{t:"atasoz",s:"Zaman her yarayı sarar.",m:"Acılar ve üzüntüler zamanla azalır, geçer."},
{t:"atasoz",s:"Zeytinin yağı zeytinden çıkar.",m:"Her şeyin özü kendinden gelir; kaynak önemlidir."},
{t:"atasoz",s:"Zenginin şakası da ağır basar.",m:"Güçlü insanların esprileri bile baskı olarak hissedilir."},
{t:"atasoz",s:"Zulüm ile âbâd olanın âkıbeti berbat olur.",m:"Başkasına zulümle yükselen, sonunda yıkılır."},
{t:"atasoz",s:"Zulüm uzun sürmez.",m:"Haksızlık kalıcı olamaz; er geç sona erer."},

let deck=[],current=0,flipped=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadCard(){
  const item=deck[current];flipped=false;
  document.getElementById('card').classList.remove('flipped');
  const isDeyim=item.t==='deyim';
  const cls=isDeyim?'bd':'ba';const lbl=isDeyim?'Deyim':'Atasözü';
  document.getElementById('tb1').textContent=lbl;document.getElementById('tb1').className='badge '+cls;
  document.getElementById('ctitle').textContent=item.s;
  const ex=document.getElementById('cex');
  if(isDeyim&&item.e){ex.innerHTML=item.e;ex.style.display=''}else{ex.style.display='none'}
  document.getElementById('tb2').textContent=lbl;document.getElementById('tb2').className='badge '+cls;
  document.getElementById('cmean').textContent=item.m;
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('counter').textContent=(current+1)+' / '+deck.length;
}
function flipCard(){if(flipped)return;flipped=true;document.getElementById('card').classList.add('flipped');document.getElementById('nextBtn').style.display='inline-block'}
function nextCard(){current++;if(current>=deck.length){showDone();return}loadCard()}
function showDone(){
  document.querySelector('.scene').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('counter').style.display='none';
  const ds=document.getElementById('done');ds.style.display='flex';
  document.getElementById('doneMsg').textContent=deck.length+' kartın hepsini tamamladın!';
}
function restart(){
  deck=shuffle([...D]);current=0;
  document.querySelector('.scene').style.display='';
  document.getElementById('counter').style.display='';
  document.getElementById('done').style.display='none';
  loadCard();
}
deck=shuffle([...D]);loadCard();
