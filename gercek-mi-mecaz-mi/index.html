<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerçek mi? Mecaz mı?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --text: #e8eaf6;
    --text-dim: #8892b0;
    --accent: #7c83fd;
    --highlight: #ffd166;
    --correct: #06d6a0;
    --wrong: #ef4565;
    --btn-gercek: #3a86ff;
    --btn-mecaz: #ff6b6b;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 85%, rgba(255,255,255,0.15) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 92%;
    max-width: 860px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #7c83fd, #ffd166);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
    margin-top: 10px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--highlight));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .counter {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-top: 6px;
    font-weight: 600;
  }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 44px 48px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    margin-bottom: 28px;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--highlight));
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .sentence {
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.5;
    color: var(--text);
  }

  .highlight-word {
    color: var(--highlight);
    font-weight: 900;
    font-size: 2.1rem;
    position: relative;
    display: inline-block;
    padding: 0 2px;
  }

  .highlight-word::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0; right: 0;
    height: 3px;
    background: var(--highlight);
    border-radius: 2px;
    opacity: 0.6;
  }

  /* Feedback bar */
  .feedback {
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    font-weight: 700;
    text-align: center;
    padding: 10px 20px;
    border-radius: 12px;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .feedback.show {
    opacity: 1;
    transform: translateY(0);
  }

  .feedback.correct-fb {
    background: rgba(6, 214, 160, 0.12);
    border: 1px solid rgba(6, 214, 160, 0.35);
    color: var(--correct);
  }

  .feedback.wrong-fb {
    background: rgba(239, 69, 101, 0.12);
    border: 1px solid rgba(239, 69, 101, 0.35);
    color: #ff8fa3;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-bottom: 22px;
  }

  .btn-answer {
    flex: 1;
    max-width: 220px;
    padding: 20px 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.2s;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  .btn-answer::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn-answer:hover:not(:disabled)::before { opacity: 1; }
  .btn-answer:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .btn-answer:active:not(:disabled) { transform: translateY(0px); }

  .btn-answer:disabled {
    cursor: not-allowed;
    filter: brightness(0.6) saturate(0.5);
  }

  .btn-answer.btn-gercek {
    background: linear-gradient(135deg, #3a86ff, #2667cc);
    color: white;
    box-shadow: 0 4px 20px rgba(58,134,255,0.35);
  }

  .btn-answer.btn-mecaz {
    background: linear-gradient(135deg, #ff6b6b, #cc4444);
    color: white;
    box-shadow: 0 4px 20px rgba(255,107,107,0.35);
  }

  .btn-answer.correct-choice {
    filter: brightness(1.2) !important;
    box-shadow: 0 0 0 3px var(--correct), 0 8px 28px rgba(6,214,160,0.4) !important;
    background: linear-gradient(135deg, #06d6a0, #04a87d) !important;
    color: white !important;
  }

  .btn-next {
    display: block;
    margin: 0 auto;
    padding: 16px 52px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), #5a62e8);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(124,131,253,0.4);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
    opacity: 0;
    pointer-events: none;
  }

  .btn-next.show {
    opacity: 1;
    pointer-events: all;
  }

  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,131,253,0.5); }

  /* Score chip */
  .score-chip {
    position: fixed;
    top: 22px;
    right: 28px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 99px;
    padding: 8px 18px;
    font-size: 1rem;
    font-weight: 800;
    color: var(--text);
    z-index: 10;
    display: flex;
    gap: 14px;
  }

  .score-chip .sc { color: var(--correct); }
  .score-chip .sw { color: var(--wrong); }

  /* Aferin */
  .aferin {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 5rem;
    font-weight: 900;
    color: var(--highlight);
    z-index: 100;
    pointer-events: none;
    text-shadow: 0 4px 30px rgba(255,209,102,0.7);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    opacity: 0;
    letter-spacing: -1px;
  }

  .aferin.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
    z-index: 99;
    pointer-events: none;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Shake */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* Pulse correct */
  @keyframes pulse-correct {
    0% { box-shadow: 0 0 0 0 rgba(6,214,160,0.6); }
    70% { box-shadow: 0 0 0 18px rgba(6,214,160,0); }
    100% { box-shadow: 0 0 0 0 rgba(6,214,160,0); }
  }
</style>
</head>
<body>

<div class="score-chip">
  <span>✅ <span class="sc" id="scoreCorrect">0</span></span>
  <span>❌ <span class="sw" id="scoreWrong">0</span></span>
</div>

<div class="aferin" id="aferin">🌟 Aferin!</div>

<div class="container">
  <div class="header">
    <h1>Gerçek mi? Mecaz mı?</h1>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="counter" id="counter">1 / 500</div>
  </div>

  <div class="card" id="card">
    <div class="sentence" id="sentence"></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="btn-row">
    <button class="btn-answer btn-gercek" id="btnGercek" onclick="answer('gercek')">Gerçek</button>
    <button class="btn-answer btn-mecaz" id="btnMecaz" onclick="answer('mecaz')">Mecaz</button>
  </div>

  <button class="btn-next" id="btnNext" onclick="nextQuestion()">Sonraki Soru →</button>
</div>

<script>

// ─── UYGULAMA DURUM ──────────────────────────────────────────────────────────
let shuffled = [];
let current = 0;
let answered = false;
let scoreCorrect = 0;
let scoreWrong = 0;

// Karıştırma
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Cümleyi parçalara böl, vurgulu kelimeyi renklendir
function renderSentence(q) {
  const s = q.s;
  const w = q.w;
  // Büyük/küçük harf duyarsız bul
  const idx = s.toLowerCase().indexOf(w.toLowerCase());
  if (idx === -1) return `<span class="highlight-word">${w}</span>`;
  const before = s.slice(0, idx);
  const word = s.slice(idx, idx + w.length);
  const after = s.slice(idx + w.length);
  return `${before}<span class="highlight-word">${word}</span>${after}`;
}

function loadQuestion() {
  if (current >= shuffled.length) {
    // Tüm sorular bitti, başa dön
    shuffled = shuffle(questions);
    current = 0;
  }
  const q = shuffled[current];
  document.getElementById('sentence').innerHTML = renderSentence(q);
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btnGercek').disabled = false;
  document.getElementById('btnMecaz').disabled = false;
  document.getElementById('btnGercek').classList.remove('correct-choice');
  document.getElementById('btnMecaz').classList.remove('correct-choice');
  document.getElementById('btnNext').classList.remove('show');
  document.getElementById('card').classList.remove('shake');
  answered = false;

  // Progress
  const total = shuffled.length;
  const pct = ((current) / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('counter').textContent = `${current + 1} / ${total}`;
}

function answer(choice) {
  if (answered) return;
  answered = true;
  const q = shuffled[current];
  const correct = q.a;

  document.getElementById('btnGercek').disabled = true;
  document.getElementById('btnMecaz').disabled = true;

  const fb = document.getElementById('feedback');

  if (choice === correct) {
    scoreCorrect++;
    document.getElementById('scoreCorrect').textContent = scoreCorrect;
    fb.textContent = '✅ Doğru! ' + q.e;
    fb.className = 'feedback correct-fb show';
    showAferin();
    launchConfetti();
  } else {
    scoreWrong++;
    document.getElementById('scoreWrong').textContent = scoreWrong;
    fb.textContent = '❌ Yanlış. ' + q.e;
    fb.className = 'feedback wrong-fb show';
    playWrong();
    document.getElementById('card').classList.add('shake');
    // Doğru butonu yeşile boya
    if (correct === 'gercek') {
      document.getElementById('btnGercek').classList.add('correct-choice');
    } else {
      document.getElementById('btnMecaz').classList.add('correct-choice');
    }
  }

  document.getElementById('btnNext').classList.add('show');
}

function nextQuestion() {
  current++;
  loadQuestion();
}

// ─── AFERİN ──────────────────────────────────────────────────────────────────
function showAferin() {
  const el = document.getElementById('aferin');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1400);
}

// ─── KONFETİ ────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#ffd166','#06d6a0','#7c83fd','#ff6b6b','#ef476f','#118ab2','#ffd166'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.classList.add('confetti-piece');
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    document.body.appendChild(piece);
    piece.addEventListener('animationend', () => piece.remove());
  }
}

// ─── YANLIŞ SESİ ────────────────────────────────────────────────────────────
function playWrong() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(180, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

// ─── BAŞLAT ─────────────────────────────────────────────────────────────────
shuffled = shuffle(questions);
loadQuestion();
