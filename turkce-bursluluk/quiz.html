<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bursluluk Sınavı - Soru Çözümü</title>
  <meta name="description" content="YOKBS Bursluluk Sınavı Türkçe Soruları - Soru çözüm ekranı." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="quiz-page">

  <!-- Arka plan -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Yükleme ekranı -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Sorular yükleniyor...</div>
  </div>

  <!-- Hata ekranı -->
  <div id="error-screen" class="error-screen hidden">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Veri bulunamadı</div>
    <div class="error-desc" id="error-desc">Lütfen önce sorular dosyasını oluşturun.</div>
    <a href="index.html" class="nav-btn" style="margin-top:16px;text-decoration:none;">← Ana Sayfaya Dön</a>
  </div>

  <!-- Ana Quiz Arayüzü -->
  <div id="quiz-app" class="quiz-layout hidden">

    <!-- Üst bar -->
    <nav class="quiz-topbar">
      <a href="index.html" class="quiz-home-link" id="home-link">← Ana Sayfa</a>
      <div class="quiz-breadcrumb">
        <span id="bc-grade"></span>
        <span class="sep">/</span>
        <strong id="bc-year"></strong>
        <span class="sep">/</span>
        <span>Türkçe</span>
      </div>
      <div class="quiz-progress-wrap">
        <span class="quiz-progress-label" id="progress-label">0 / 0</span>
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </nav>

    <!-- Quiz içerik -->
    <main class="quiz-main">

      <!-- Soru Navigasyonu -->
      <div class="question-nav-wrap">
        <div class="question-nav-label">Soruya Git:</div>
        <div class="question-nav" id="question-nav" role="navigation" aria-label="Soru gezintisi"></div>
      </div>

      <!-- Soru Kartı -->
      <article class="question-card" id="question-card">
        <div class="question-header">
          <span class="question-num" id="q-num">Soru 1</span>
          <span class="question-year-tag" id="q-year-tag">2020 · 5. Sınıf</span>
        </div>

        <div class="question-image-wrap">
          <div class="image-loading" id="img-loading">
            <div class="image-loading-spinner"></div>
          </div>
          <img
            id="question-img"
            class="question-image"
            src=""
            alt="Soru görseli"
            style="display:none"
            onload="onImageLoad()"
            onerror="onImageError()"
          />
        </div>

        <!-- Geri bildirim bandı -->
        <div class="feedback-banner neutral" id="feedback-banner">
          <span id="feedback-text"></span>
        </div>
      </article>

      <!-- Seçenekler -->
      <div class="options-wrap" id="options-wrap">
        <button class="option-btn" id="opt-A" onclick="checkAnswer('A')" aria-label="A seçeneği">
          <div class="option-letter">A</div>
          <span>A Seçeneği</span>
        </button>
        <button class="option-btn" id="opt-B" onclick="checkAnswer('B')" aria-label="B seçeneği">
          <div class="option-letter">B</div>
          <span>B Seçeneği</span>
        </button>
        <button class="option-btn" id="opt-C" onclick="checkAnswer('C')" aria-label="C seçeneği">
          <div class="option-letter">C</div>
          <span>C Seçeneği</span>
        </button>
        <button class="option-btn" id="opt-D" onclick="checkAnswer('D')" aria-label="D seçeneği">
          <div class="option-letter">D</div>
          <span>D Seçeneği</span>
        </button>
      </div>

      <!-- Alt Navigasyon -->
      <div class="quiz-nav-bar">
        <button class="nav-btn" id="btn-prev" onclick="prevQuestion()" aria-label="Önceki soru">
          ← Önceki
        </button>

        <span class="question-counter-text" id="counter-text">Soru 1 / 25</span>

        <button class="nav-btn primary" id="btn-next" onclick="nextQuestion()" aria-label="Sonraki soru">
          Sonraki →
        </button>
      </div>

    </main>
  </div>

  <script>
  // ────────────────────────────────────────────────────────────
  //  Durum
  // ────────────────────────────────────────────────────────────
  let quizData   = null;   // JSON verisi
  let grade      = null;
  let year       = null;
  let questions  = [];     // [{ num, pageImg, answer }, ...]
  let current    = 0;      // mevcut soru indeksi (0-based)
  let answered   = {};     // { qIndex: 'A'|'B'|'C'|'D' }
  let results    = {};     // { qIndex: true|false }

  // ────────────────────────────────────────────────────────────
  //  Başlatma
  // ────────────────────────────────────────────────────────────
  async function init() {
    // URL parametrelerini oku
    const params = new URLSearchParams(window.location.search);
    grade = params.get('grade');
    year  = params.get('year');

    if (!grade || !year) {
      showError('URL parametreleri eksik. Lütfen ana sayfadan sınıf ve yıl seçin.');
      return;
    }

    // JSON verisini yükle
    try {
      const resp = await fetch('data/quiz_data.json');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      quizData = await resp.json();
    } catch (e) {
      showError('Veriler yüklenemedi: ' + e.message);
      return;
    }

    // Sınıf + yıl verisini al
    const yearData = quizData[year];
    if (!yearData) {
      showError(`${year} yılı verisi bulunamadı.`);
      return;
    }
    const gradeData = yearData[grade];
    if (!gradeData) {
      showError(`${year} yılı ${grade}. sınıf verisi bulunamadı.`);
      return;
    }

    // Soru listesini oluştur
    buildQuestions(gradeData, year, grade);

    // UI'ı göster
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('quiz-app').classList.remove('hidden');

    // Navigasyon ve breadcrumb
    document.getElementById('bc-grade').textContent = `${grade}. Sınıf`;
    document.getElementById('bc-year').textContent  = year;

    buildNavButtons();
    showQuestion(0);
  }

  // ────────────────────────────────────────────────────────────
  //  Soru listesi oluştur
  // ────────────────────────────────────────────────────────────
  function buildQuestions(data, year, grade) {
    const pages   = data.pages;    // [{page_img, questions:[...]}, ...]
    const answers = data.answers;  // ['C','A','A',...]

    questions = [];

    // Her soru numarası için hangi sayfada olduğunu bul
    // Cevap sayısı kadar soru var (1-indexed)
    for (let i = 0; i < answers.length; i++) {
      const qNum = i + 1;  // 1-indexed soru numarası
      // Bu soruyu içeren sayfayı bul
      let pageImg = null;
      for (const p of pages) {
        if (p.questions && p.questions.includes(qNum)) {
          pageImg = p.page_img;
          break;
        }
      }
      // Bulunamazsa ilk sayfayı kullan
      if (!pageImg && pages.length > 0) {
        pageImg = pages[0].page_img;
      }

      questions.push({
        num:      qNum,
        pageImg:  `images/${year}/${grade}/${pageImg}`,
        answer:   answers[i],
      });
    }
  }

  // ────────────────────────────────────────────────────────────
  //  Navigasyon butonları
  // ────────────────────────────────────────────────────────────
  function buildNavButtons() {
    const nav = document.getElementById('question-nav');
    nav.innerHTML = '';
    questions.forEach((q, idx) => {
      const btn = document.createElement('button');
      btn.className = 'qnav-btn';
      btn.id = `qnav-${idx}`;
      btn.textContent = q.num;
      btn.setAttribute('aria-label', `${q.num}. soruya git`);
      btn.onclick = () => goToQuestion(idx);
      nav.appendChild(btn);
    });
  }

  function updateNavButton(idx) {
    const btn = document.getElementById(`qnav-${idx}`);
    if (!btn) return;
    btn.classList.remove('current', 'answered-correct', 'answered-wrong');
    if (idx === current) {
      btn.classList.add('current');
    } else if (results[idx] === true) {
      btn.classList.add('answered-correct');
    } else if (results[idx] === false) {
      btn.classList.add('answered-wrong');
    }
  }

  // ────────────────────────────────────────────────────────────
  //  Soru göster
  // ────────────────────────────────────────────────────────────
  function showQuestion(idx) {
    if (idx < 0 || idx >= questions.length) return;

    const prev = current;
    current = idx;

    const q = questions[idx];

    // Soru başlığı
    document.getElementById('q-num').textContent      = `Soru ${q.num}`;
    document.getElementById('q-year-tag').textContent = `${year} · ${grade}. Sınıf`;
    document.getElementById('counter-text').textContent = `Soru ${idx + 1} / ${questions.length}`;

    // İlerleme çubuğu
    const answeredCount = Object.keys(results).length;
    document.getElementById('progress-label').textContent = `${answeredCount} / ${questions.length}`;
    document.getElementById('progress-fill').style.width  = `${(answeredCount / questions.length) * 100}%`;

    // Görsel
    const img     = document.getElementById('question-img');
    const loading = document.getElementById('img-loading');
    img.style.display = 'none';
    loading.style.display = 'flex';
    img.src = q.pageImg;

    // Geri bildirimi temizle
    hideFeedback();

    // Seçenek butonları
    resetOptions();

    // Eğer bu soru daha önce yanıtlandıysa
    if (answered[idx] !== undefined) {
      const chosen = answered[idx];
      const correct = q.answer;
      lockOptions();
      if (chosen === correct) {
        document.getElementById(`opt-${chosen}`).classList.add('correct-answer');
        showFeedback(true);
      } else {
        document.getElementById(`opt-${chosen}`).classList.add('wrong-answer');
        document.getElementById(`opt-${correct}`).classList.add('correct-answer');
        showFeedback(false);
      }
    }

    // Nav butonlarını güncelle
    updateNavButton(prev);
    updateNavButton(current);

    // Önceki/Sonraki butonları
    document.getElementById('btn-prev').disabled = (idx === 0);
    document.getElementById('btn-next').disabled = (idx === questions.length - 1);

    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ────────────────────────────────────────────────────────────
  //  Cevap kontrolü
  // ────────────────────────────────────────────────────────────
  function checkAnswer(choice) {
    if (answered[current] !== undefined) return;  // Zaten yanıtlandı

    const q = questions[current];
    answered[current] = choice;

    lockOptions();

    if (choice === q.answer) {
      results[current] = true;
      document.getElementById(`opt-${choice}`).classList.add('correct-answer');
      showFeedback(true);
    } else {
      results[current] = false;
      document.getElementById(`opt-${choice}`).classList.add('wrong-answer');
      document.getElementById(`opt-${q.answer}`).classList.add('correct-answer');
      showFeedback(false, q.answer);
    }

    // İlerleme çubuğunu güncelle
    const answeredCount = Object.keys(results).length;
    document.getElementById('progress-label').textContent = `${answeredCount} / ${questions.length}`;
    document.getElementById('progress-fill').style.width  = `${(answeredCount / questions.length) * 100}%`;

    // Navigasyon butonunu güncelle
    updateNavButton(current);
  }

  // ────────────────────────────────────────────────────────────
  //  Geri bildirim
  // ────────────────────────────────────────────────────────────
  function showFeedback(correct, correctAnswer) {
    const banner = document.getElementById('feedback-banner');
    const text   = document.getElementById('feedback-text');

    banner.classList.remove('neutral', 'correct', 'wrong');

    if (correct) {
      banner.classList.add('correct');
      text.textContent = '🎉 Tebrikler! Doğru cevap!';
    } else {
      banner.classList.add('wrong');
      text.textContent = correctAnswer
        ? `❌ Yanlış! Doğru cevap: ${correctAnswer}`
        : '❌ Yanlış cevap!';

      // Yanlış mesajı bir süre sonra kaybolsun (3.5 saniye)
      setTimeout(() => {
        if (!document.getElementById('feedback-banner').classList.contains('correct')) {
          hideFeedback();
        }
      }, 3500);
    }
  }

  function hideFeedback() {
    const banner = document.getElementById('feedback-banner');
    banner.classList.remove('correct', 'wrong');
    banner.classList.add('neutral');
    document.getElementById('feedback-text').textContent = '';
  }

  // ────────────────────────────────────────────────────────────
  //  Seçenek butonları yönetimi
  // ────────────────────────────────────────────────────────────
  function resetOptions() {
    ['A','B','C','D'].forEach(letter => {
      const btn = document.getElementById(`opt-${letter}`);
      btn.disabled = false;
      btn.classList.remove('correct-answer', 'wrong-answer');
    });
  }

  function lockOptions() {
    ['A','B','C','D'].forEach(letter => {
      document.getElementById(`opt-${letter}`).disabled = true;
    });
  }

  // ────────────────────────────────────────────────────────────
  //  Navigasyon
  // ────────────────────────────────────────────────────────────
  function nextQuestion()     { goToQuestion(current + 1); }
  function prevQuestion()     { goToQuestion(current - 1); }
  function goToQuestion(idx)  {
    if (idx >= 0 && idx < questions.length) showQuestion(idx);
  }

  // ────────────────────────────────────────────────────────────
  //  Görsel olayları
  // ────────────────────────────────────────────────────────────
  function onImageLoad() {
    document.getElementById('img-loading').style.display = 'none';
    document.getElementById('question-img').style.display = 'block';
  }

  function onImageError() {
    document.getElementById('img-loading').style.display = 'none';
    const img = document.getElementById('question-img');
    img.style.display = 'block';
    img.alt = 'Görsel yüklenemedi. Lütfen Python scriptini çalıştırdığınızdan emin olun.';
    img.style.minHeight = '200px';
    img.style.background = '#f5f5f5';
  }

  // ────────────────────────────────────────────────────────────
  //  Hata göster
  // ────────────────────────────────────────────────────────────
  function showError(msg) {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('error-screen').classList.remove('hidden');
    document.getElementById('error-desc').textContent = msg;
  }

  // ────────────────────────────────────────────────────────────
  //  Klavye kısayolları
  // ────────────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    switch(e.key) {
      case 'ArrowRight': case 'ArrowDown':  nextQuestion(); break;
      case 'ArrowLeft':  case 'ArrowUp':    prevQuestion(); break;
      case 'a': case 'A': checkAnswer('A'); break;
      case 'b': case 'B': checkAnswer('B'); break;
      case 'c': case 'C': checkAnswer('C'); break;
      case 'd': case 'D': checkAnswer('D'); break;
    }
  });

  // ────────────────────────────────────────────────────────────
  //  Başlat
  // ────────────────────────────────────────────────────────────
  init();
  </script>
</body>
</html>
