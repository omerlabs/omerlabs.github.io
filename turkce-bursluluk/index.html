<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bursluluk Sınavı - Türkçe Soruları</title>
  <meta name="description" content="İlköğretim ve Ortaöğretim Kurumları Bursluluk Sınavı Türkçe Soruları - Sınıfa göre pratik yapın." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-page">

  <!-- Arka plan dekor -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="home-container">
    <!-- Header -->
    <header class="home-header">
      <div class="logo-badge">YOKBS</div>
      <h1 class="home-title">Bursluluk Sınavı</h1>
      <p class="home-subtitle">Türkçe Soruları Pratik Platformu</p>
      <p class="home-desc">Yıllara göre çıkmış gerçek sınav sorularıyla pratik yap, cevap anahtarını anında gör.</p>
    </header>

    <!-- Sınıf Seçimi -->
    <section class="grade-section">
      <h2 class="section-title">Sınıfını Seç</h2>
      <div class="grade-grid">
        <button class="grade-card" id="grade-5" onclick="selectGrade(5)" aria-label="5. Sınıf seç">
          <div class="grade-number">5</div>
          <div class="grade-label">. Sınıf</div>
          <div class="grade-desc">İlkokul Türkçe</div>
          <div class="grade-arrow">→</div>
        </button>
        <button class="grade-card" id="grade-6" onclick="selectGrade(6)" aria-label="6. Sınıf seç">
          <div class="grade-number">6</div>
          <div class="grade-label">. Sınıf</div>
          <div class="grade-desc">İlkokul Türkçe</div>
          <div class="grade-arrow">→</div>
        </button>
        <button class="grade-card" id="grade-7" onclick="selectGrade(7)" aria-label="7. Sınıf seç">
          <div class="grade-number">7</div>
          <div class="grade-label">. Sınıf</div>
          <div class="grade-desc">Ortaokul Türkçe</div>
          <div class="grade-arrow">→</div>
        </button>
        <button class="grade-card" id="grade-8" onclick="selectGrade(8)" aria-label="8. Sınıf seç">
          <div class="grade-number">8</div>
          <div class="grade-label">. Sınıf</div>
          <div class="grade-desc">Ortaokul Türkçe</div>
          <div class="grade-arrow">→</div>
        </button>
      </div>
    </section>

    <!-- Yıl Seçimi (başlangıçta gizli) -->
    <section class="year-section hidden" id="year-section">
      <div class="year-section-header">
        <button class="back-btn" id="back-to-grades" onclick="backToGrades()">← Geri</button>
        <h2 class="section-title" id="year-section-title">5. Sınıf - Yıl Seç</h2>
      </div>
      <div class="year-grid" id="year-grid">
        <!-- Yıllar JS ile doldurulacak -->
      </div>
    </section>

    <!-- Alt bilgi -->
    <footer class="home-footer">
      <p>YÖK Bursluluk Sınavı (YOKBS) &nbsp;·&nbsp; 2020 – 2026 &nbsp;·&nbsp; Türkçe Testleri</p>
    </footer>
  </div>

  <script>
    const YEARS = ['2020', '2021', '2022', '2023', '2024', '2025', '2026'];
    let selectedGrade = null;

    function selectGrade(grade) {
      selectedGrade = grade;

      // Aktif sınıf butonunu işaretle
      document.querySelectorAll('.grade-card').forEach(c => c.classList.remove('active'));
      document.getElementById(`grade-${grade}`).classList.add('active');

      // Yıl başlığını güncelle
      document.getElementById('year-section-title').textContent = `${grade}. Sınıf — Yıl Seçin`;

      // Yıl kartlarını oluştur
      const grid = document.getElementById('year-grid');
      grid.innerHTML = '';
      YEARS.forEach(year => {
        const btn = document.createElement('button');
        btn.className = 'year-card';
        btn.setAttribute('aria-label', `${year} yılı ${grade}. sınıf soruları`);
        btn.innerHTML = `
          <span class="year-num">${year}</span>
          <span class="year-arrow">→</span>
        `;
        btn.onclick = () => goToQuiz(grade, year);
        grid.appendChild(btn);
      });

      // Sınıf bölümünü gizle, yıl bölümünü göster
      document.querySelector('.grade-section').classList.add('slide-out');
      setTimeout(() => {
        document.querySelector('.grade-section').classList.add('hidden');
        document.querySelector('.grade-section').classList.remove('slide-out');
        const ys = document.getElementById('year-section');
        ys.classList.remove('hidden');
        ys.classList.add('slide-in');
        setTimeout(() => ys.classList.remove('slide-in'), 400);
      }, 250);
    }

    function backToGrades() {
      document.getElementById('year-section').classList.add('hidden');
      document.querySelector('.grade-section').classList.remove('hidden');
      document.querySelectorAll('.grade-card').forEach(c => c.classList.remove('active'));
    }

    function goToQuiz(grade, year) {
      window.location.href = `quiz.html?grade=${grade}&year=${year}`;
    }
  </script>
</body>
</html>
