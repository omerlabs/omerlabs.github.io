name: Update S&P 500 Data

on:
  schedule:
    # Runs at 22:30 UTC every weekday (Monday - Friday), about 2.5 hours after market close
    - cron: '30 22 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Required to push the updated JSON back to the repo

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-size: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance beautifulsoup4 requests lxml pandas

      - name: Run data update script
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/sp500.json
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update S&P 500 financial data [skip ci]"
            git push origin main
          else
            echo "No changes in S&P 500 data, skipping commit."
          fi
