<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kural Bul! 🔍</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e2e; --card:#1a1840; --card2:#221f50;
  --gold:#ffd166; --mint:#06d6a0; --pink:#ff6b9d;
  --purple:#c084fc; --coral:#ff6b6b; --sky:#74c0fc;
  --text:#f0eeff; --muted:#9880bb; --border:rgba(255,255,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 12px 60px;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 0%,#3d1060 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,#0a2050 0%,transparent 50%);
}

/* STARS */
.star{position:fixed;border-radius:50%;background:white;pointer-events:none;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.5}}

/* HEADER */
.title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.8rem,5.5vw,2.8rem);color:var(--gold);
  text-shadow:0 0 30px rgba(255,209,102,.4),3px 3px 0 rgba(0,0,0,.4);
  text-align:center;margin-bottom:4px;position:relative;z-index:1;
}
.subtitle{font-size:.86rem;color:var(--muted);font-weight:700;text-align:center;margin-bottom:12px;position:relative;z-index:1;}

/* SCORE BAR */
.score-bar{
  position:relative;z-index:1;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;
  background:var(--card);border-radius:20px;
  padding:9px 18px;margin-bottom:10px;
  border:1.5px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.sc-v{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--gold);line-height:1;text-align:center;}
.sc-l{font-size:.62rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;text-align:center;}
.sc-d{width:2px;height:30px;background:var(--border);border-radius:2px;}
.cat-badge{
  font-size:.75rem;font-weight:900;padding:4px 12px;border-radius:12px;
  color:white;letter-spacing:.3px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  white-space:nowrap;
}

/* QUESTION NUMBER */
.q-number{
  position:relative;z-index:1;
  font-family:'Fredoka One',cursive;
  font-size:.9rem;color:var(--muted);text-align:center;
  margin-bottom:6px;letter-spacing:.5px;
}
.q-number span{color:var(--gold);}

/* PROGRESS BAR */
.prog-bar-wrap{
  position:relative;z-index:1;
  width:100%;max-width:560px;height:8px;
  background:rgba(255,255,255,.08);border-radius:6px;
  margin-bottom:12px;overflow:hidden;
}
.prog-bar-fill{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--purple),var(--pink));
  transition:width .5s ease;
}

/* PUZZLE CARD */
.puzzle-card{
  position:relative;z-index:1;
  background:var(--card);border-radius:26px;
  padding:20px 16px 18px;
  max-width:560px;width:100%;
  border:1.5px solid var(--border);
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  margin-bottom:12px;
}
.cat-label{font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--purple);margin-bottom:6px;}
.qtext{font-size:clamp(.88rem,2.6vw,1rem);font-weight:800;color:var(--text);margin-bottom:16px;line-height:1.5;}

/* SEQUENCE */
.sequence{
  display:flex;align-items:center;justify-content:center;
  gap:7px;flex-wrap:wrap;margin-bottom:16px;min-height:72px;
}
.seq-item{
  display:flex;align-items:center;justify-content:center;
  border-radius:13px;background:var(--card2);
  border:2px solid rgba(255,255,255,.1);
  animation:itemReveal .4s cubic-bezier(.3,1.5,.5,1) both;
}
@keyframes itemReveal{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.seq-item.qslot{
  background:rgba(255,255,255,.04);
  border:2.5px dashed rgba(255,255,255,.22);
  color:rgba(255,255,255,.28);font-size:1.8rem;
}
.seq-arrow{color:var(--muted);font-size:1rem;font-weight:900;flex-shrink:0;}

/* HINT */
.hint-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.hint-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(192,132,252,.1);border:1.5px solid rgba(192,132,252,.22);
  border-radius:16px;padding:4px 12px;
  font-size:.78rem;font-weight:800;color:var(--purple);
  cursor:pointer;transition:background .2s;
  font-family:'Nunito',sans-serif;flex-shrink:0;
}
.hint-chip:hover{background:rgba(192,132,252,.2);}
.hint-text{font-size:.8rem;font-weight:700;color:var(--gold);line-height:1.4;}

/* CHOICES */
.choices{display:grid;gap:9px;}
.choices.g2{grid-template-columns:repeat(2,1fr);}
.choices.g3{grid-template-columns:repeat(3,1fr);}
.choices.g4{grid-template-columns:repeat(4,1fr);}
@media(max-width:380px){.choices.g4{grid-template-columns:repeat(2,1fr);}}

.choice-btn{
  background:var(--card2);border:2.5px solid rgba(255,255,255,.1);
  border-radius:16px;padding:10px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:all .15s;color:var(--text);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;
  min-height:74px;
}
.choice-btn:hover:not(:disabled){transform:scale(1.05);border-color:var(--purple);box-shadow:0 4px 16px rgba(192,132,252,.25);}
.choice-btn.correct{border-color:var(--mint)!important;background:rgba(6,214,160,.15)!important;animation:cpop .4s ease;}
.choice-btn.wrong{border-color:var(--coral)!important;background:rgba(255,107,107,.1)!important;animation:cshake .4s ease;}
.choice-btn:disabled{pointer-events:none;opacity:.6;}
@keyframes cpop{0%{transform:scale(1)}45%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes cshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* AUTO ADVANCE BAR */
.auto-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;display:none;overflow:hidden;}
.auto-bar-wrap.show{display:block;}
.auto-bar{height:100%;background:var(--mint);border-radius:2px;width:100%;
  animation:shrinkBar 1.5s linear forwards;}
@keyframes shrinkBar{from{width:100%}to{width:0%}}

/* WRONG FEEDBACK MODAL */
.fb-overlay{
  position:fixed;inset:0;z-index:100;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(10px);
}
.fb-overlay.show{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb-box{
  background:var(--card);border-radius:26px;padding:28px 32px;
  text-align:center;max-width:340px;width:90%;
  border:1.5px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:popIn .4s cubic-bezier(.3,1.5,.5,1);
}
@keyframes popIn{from{transform:scale(.65)}to{transform:scale(1)}}
.fb-emoji{font-size:3.5rem;display:block;margin-bottom:8px;}
.fb-title{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--coral);margin-bottom:5px;}
.fb-sub{font-size:.85rem;font-weight:700;color:var(--muted);margin-bottom:10px;line-height:1.5;}
.fb-rule{background:rgba(6,214,160,.08);border-radius:12px;padding:9px 12px;
  font-size:.82rem;font-weight:800;color:var(--text);line-height:1.5;margin-bottom:14px;text-align:left;}
.fb-next-btn{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;
  padding:11px 24px;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,var(--purple),var(--pink));color:white;
  box-shadow:0 4px 14px rgba(192,132,252,.35);transition:transform .15s;width:100%;
}
.fb-next-btn:hover{transform:scale(1.04);}

/* JUMP BAR */
.jump-bar{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:8px;justify-content:center;
  margin-bottom:10px;flex-wrap:wrap;
}
.jump-label{font-size:.78rem;font-weight:800;color:var(--muted);}
.jump-input{
  width:64px;text-align:center;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;
  color:var(--text);background:var(--card2);
  border:1.5px solid var(--border);border-radius:12px;
  padding:6px 4px;outline:none;
}
.jump-input:focus{border-color:var(--purple);}
.jump-btn{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.8rem;
  padding:7px 16px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,var(--purple),var(--pink));color:white;
  transition:transform .15s;
}
.jump-btn:hover{transform:scale(1.05);}
.jump-msg{font-size:.72rem;font-weight:800;color:var(--coral);width:100%;text-align:center;min-height:14px;}

/* WIN SCREEN */
.win-screen{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
  background:rgba(20,8,40,.88);backdrop-filter:blur(14px);
}
.win-screen.show{display:flex;animation:fadeIn .5s ease;}
.win-box{
  background:var(--card);border-radius:30px;padding:36px 42px;
  text-align:center;max-width:380px;width:90%;
  border:2px solid rgba(255,209,102,.25);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:popIn .5s cubic-bezier(.3,1.5,.5,1);
}
.win-ada{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2.8rem,9vw,5rem);
  background:linear-gradient(135deg,#ffd166,#ff6b9d,#c084fc,#06d6a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:adaPulse 1.4s ease infinite alternate;line-height:1;margin-bottom:6px;
}
@keyframes adaPulse{from{letter-spacing:0}to{letter-spacing:7px}}
.win-sub{font-size:.95rem;font-weight:800;color:var(--muted);margin-bottom:18px;}
.win-stats{display:flex;gap:18px;justify-content:center;margin-bottom:20px;}
.wstat{display:flex;flex-direction:column;align-items:center;}
.wstat-v{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);line-height:1;}
.wstat-l{font-size:.65rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.again-btn{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;
  padding:12px 30px;border:none;border-radius:18px;cursor:pointer;
  background:linear-gradient(135deg,var(--purple),var(--pink));color:white;
  box-shadow:0 4px 16px rgba(192,132,252,.35);transition:transform .15s;width:100%;margin-bottom:8px;
}
.again-btn:hover{transform:scale(1.05);}
.restart-from-btn{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;
  padding:9px;border:1.5px solid var(--border);border-radius:14px;
  cursor:pointer;background:transparent;color:var(--muted);
  transition:all .15s;width:100%;
}
.restart-from-btn:hover{color:var(--gold);border-color:var(--gold);}

/* CORRECT FLASH */
.correct-flash{
  position:fixed;top:45%;left:50%;
  transform:translate(-50%,-50%);
  font-size:4rem;pointer-events:none;z-index:300;opacity:0;
  animation:bigFlash .65s ease forwards;
}
@keyframes bigFlash{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  40%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-90%) scale(.8)}
}
</style>
</head>
<body>

<div id="starField"></div>

<div class="title">🔍 Kural Bul!</div>
<div class="subtitle">Diziyi incele → kuralı bul → doğruyu seç!</div>

<div class="score-bar">
  <div><div class="sc-v" id="scoreVal">0</div><div class="sc-l">Puan</div></div>
  <div class="sc-d"></div>
  <div><div class="sc-v" id="streakVal">0</div><div class="sc-l">Seri 🔥</div></div>
  <div class="sc-d"></div>
  <div class="cat-badge" id="catBadge">🎨 Renk</div>
</div>

<div class="q-number">Soru <span id="qNum">1</span> / <span id="qTotal">150</span></div>

<div class="jump-bar">
  <span class="jump-label">Soruya git:</span>
  <input type="number" class="jump-input" id="jumpInput" min="1" max="150" placeholder="12">
  <button class="jump-btn" onclick="goToQuestion()">Git →</button>
  <div class="jump-msg" id="jumpMsg"></div>
</div>

<div class="prog-bar-wrap">
  <div class="prog-bar-fill" id="progFill" style="width:0%"></div>
</div>

<div class="puzzle-card">
  <div class="cat-label" id="catLabel">Renk Dizisi</div>
  <div class="qtext" id="qtext">Yükleniyor...</div>
  <div class="sequence" id="sequence"></div>
  <div class="hint-row">
    <div class="hint-chip" id="hintChip" onclick="showHint()">💡 İpucu</div>
    <div class="hint-text" id="hintText"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="auto-bar-wrap" id="autoBarWrap"><div class="auto-bar" id="autoBar"></div></div>
</div>

<!-- Wrong feedback -->
<div class="fb-overlay" id="fbOverlay">
  <div class="fb-box">
    <span class="fb-emoji" id="fbEmoji">🤔</span>
    <div class="fb-title">Neredeyse!</div>
    <div class="fb-sub" id="fbSub">Doğru cevap ve kural:</div>
    <div class="fb-rule" id="fbRule"></div>
    <button class="fb-next-btn" onclick="closeFbAndNext()">Devam Et →</button>
  </div>
</div>

<!-- Win screen -->
<div class="win-screen" id="winScreen">
  <div class="win-box">
    <div class="win-ada">Tebrikler Ada!</div>
    <div class="win-sub" id="winSub">Tüm soruları bitirdin! 🎉</div>
    <div class="win-stats">
      <div class="wstat"><div class="wstat-v" id="wScore">0</div><div class="wstat-l">Puan</div></div>
      <div class="wstat"><div class="wstat-v" id="wCorrect">0</div><div class="wstat-l">Doğru</div></div>
      <div class="wstat"><div class="wstat-v" id="wStreak">0</div><div class="wstat-l">En İyi Seri</div></div>
    </div>
    <button class="again-btn" onclick="startFrom(0)">🔄 Baştan Oyna</button>
    <button class="restart-from-btn" id="restartFromBtn" onclick="startFrom(currentIdx)">↩ Kaldığım Yerden</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════════════════ */
function shapeHTML(shape,color,size){
  const s=size,h=s/2;
  const star=()=>{const pts=[];for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2,r=i%2?h*.38:h*.82;pts.push(`${h+r*Math.cos(a)},${h+r*Math.sin(a)}`);}return pts.join(' ');};
  const maps={
    circle:`<circle cx="${h}" cy="${h}" r="${h*.82}" fill="${color}"/>`,
    square:`<rect x="${s*.1}" y="${s*.1}" width="${s*.8}" height="${s*.8}" rx="${s*.1}" fill="${color}"/>`,
    triangle:`<polygon points="${h},${s*.08} ${s*.9},${s*.9} ${s*.1},${s*.9}" fill="${color}"/>`,
    star:`<polygon points="${star()}" fill="${color}"/>`,
    heart:`<path d="M${h},${s*.75} C${h},${s*.2} ${s*.1},${s*.1} ${s*.27},${s*.1} C${s*.45},${s*.1} ${h},${s*.4} ${h},${s*.4} C${h},${s*.4} ${s*.55},${s*.1} ${s*.73},${s*.1} C${s*.9},${s*.1} ${s*.9},${s*.2} ${s*.9},${s*.38} C${s*.9},${s*.72} ${h},${s*.88} ${h},${s*.88}Z" fill="${color}"/>`,
    diamond:`<polygon points="${h},${s*.08} ${s*.92},${h} ${h},${s*.92} ${s*.08},${h}" fill="${color}"/>`,
  };
  return `<svg viewBox="0 0 ${s} ${s}" width="${s}" height="${s}">${maps[shape]||maps.circle}</svg>`;
}

function dotsHTML(n,color,size){
  const pos=[[1,1],[1,3],[3,1],[3,3],[2,2],[0,2],[4,2],[2,0],[2,4]];
  let svg=`<svg viewBox="0 0 5 5" width="${size}" height="${size}">`;
  for(let i=0;i<Math.min(n,9);i++){const[cx,cy]=pos[i];svg+=`<circle cx="${cx+.5}" cy="${cy+.5}" r=".38" fill="${color}"/>`;}
  return svg+'</svg>';
}

function renderItem(item){
  const sz=item.size||50;
  if(item.type==='emoji') return `<span style="font-size:${sz*.72}px;line-height:1">${item.v}</span>`;
  if(item.type==='shape') return shapeHTML(item.shape,item.color,sz);
  if(item.type==='num')   return `<span style="font-family:'Fredoka One',cursive;font-size:${sz*.58}px;color:${item.color||'#ffd166'};line-height:1">${item.v}</span>`;
  if(item.type==='dots')  return dotsHTML(item.n,item.color||'#06d6a0',sz);
  if(item.type==='color') return `<div style="width:${sz}px;height:${sz}px;background:${item.color};border-radius:${sz*.15}px"></div>`;
  return '';
}

function itemEl(item){
  const sz=item.size||50;
  const el=document.createElement('div');
  el.className='seq-item';
  el.style.width=(sz+14)+'px';el.style.height=(sz+14)+'px';
  el.innerHTML=renderItem(item);
  return el;
}

/* ═══════════════════════════════════════════════════
   COLOR PALETTE
═══════════════════════════════════════════════════ */
const C={
  red:'#ef4444',orange:'#f97316',yellow:'#fbbf24',green:'#22c55e',
  blue:'#3b82f6',purple:'#a855f7',pink:'#f472b6',cyan:'#06b6d4',
  white:'#f0eeff',lime:'#84cc16',teal:'#14b8a6',rose:'#fb7185',
  gold:'#ffd166',mint:'#06d6a0',sky:'#74c0fc',lavender:'#c084fc',
  brown:'#92400e',navy:'#1d4ed8',coral:'#ff6b6b'
};

/* ═══════════════════════════════════════════════════
   150 PUZZLES  —  FIXED ORDER
   Categories: colour, shape, size, emoji/story, number(easy), dots, mixed
═══════════════════════════════════════════════════ */
const PUZZLES = [

/* ══ 1-10: RENK — Basit tekrar ══ */
{cat:'🎨 Renk',q:'Renkler tekrar ediyor. Sıradaki hangisi?',
 items:[{type:'color',color:C.red,size:46},{type:'color',color:C.blue,size:46},{type:'color',color:C.red,size:46},{type:'color',color:C.blue,size:46}],
 choices:[{type:'color',color:C.red,size:44},{type:'color',color:C.blue,size:44},{type:'color',color:C.green,size:44},{type:'color',color:C.yellow,size:44}],
 ans:0,hint:'Kırmızı-Mavi-Kırmızı-Mavi...',rule:'Kural: Kırmızı → Mavi → tekrar! 🔴🔵'},

{cat:'🎨 Renk',q:'Sıradaki renk hangisi?',
 items:[{type:'color',color:C.green,size:46},{type:'color',color:C.yellow,size:46},{type:'color',color:C.green,size:46},{type:'color',color:C.yellow,size:46}],
 choices:[{type:'color',color:C.green,size:44},{type:'color',color:C.blue,size:44},{type:'color',color:C.yellow,size:44},{type:'color',color:C.red,size:44}],
 ans:0,hint:'Yeşil-Sarı-Yeşil-Sarı...',rule:'Kural: Yeşil → Sarı → tekrar! 💚💛'},

{cat:'🎨 Renk',q:'Üç renk tekrar ediyor. Sıradaki ne?',
 items:[{type:'color',color:C.red,size:46},{type:'color',color:C.blue,size:46},{type:'color',color:C.green,size:46},{type:'color',color:C.red,size:46},{type:'color',color:C.blue,size:46}],
 choices:[{type:'color',color:C.red,size:44},{type:'color',color:C.blue,size:44},{type:'color',color:C.green,size:44},{type:'color',color:C.yellow,size:44}],
 ans:2,hint:'Kırmızı-Mavi-Yeşil... 3\'lü döngü!',rule:'Kural: Kırmızı → Mavi → Yeşil → tekrar! 🔴🔵💚'},

 ans:1,hint:'Kırmızı-Turuncu-Sarı-Yeşil... Gökkuşağı!',rule:'Kural: Gökkuşağı sırası! 🌈 K-T-S-Y-M...'},

{cat:'🎨 Renk',q:'Pembe ile sarı birbiriyle yer değiştiriyor. Sıradaki?',

/* ═══════════════════════════════════════════════════
   GAME ENGINE
═══════════════════════════════════════════════════ */
const TOTAL = PUZZLES.length;
let currentIdx = 0;
let score = 0, streak = 0, maxStreak = 0, correctCount = 0;
let hintUsed = false, answered = false;
let autoTimer = null;
let startIdx = 0; // for "resume" feature

document.getElementById('qTotal').textContent = TOTAL;
document.getElementById('jumpInput').max = TOTAL;

function startFrom(fromIdx) {
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('fbOverlay').classList.remove('show');
  score = 0; streak = 0; maxStreak = 0; correctCount = 0;
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('streakVal').textContent = 0;
  currentIdx = fromIdx;
  startIdx = fromIdx;
  loadPuzzle();
}

function startGame() { startFrom(0); }

function goToQuestion() {
  const input = document.getElementById('jumpInput');
  const msg = document.getElementById('jumpMsg');
  const n = parseInt(input.value, 10);
  if (!n || n < 1 || n > TOTAL) {
    msg.textContent = `Lütfen 1 ile ${TOTAL} arasında bir sayı gir.`;
    return;
  }
  msg.textContent = '';
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('fbOverlay').classList.remove('show');
  clearTimeout(autoTimer);
  currentIdx = n - 1;
  startIdx = currentIdx;
  input.value = '';
  loadPuzzle();
}

document.getElementById('jumpInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') goToQuestion();
});

function loadPuzzle() {
  clearTimeout(autoTimer);
  answered = false; hintUsed = false;
  document.getElementById('hintText').textContent = '';
  document.getElementById('hintChip').style.display = 'inline-flex';
  document.getElementById('autoBarWrap').classList.remove('show');

  const p = PUZZLES[currentIdx];

  // Update HUD
  document.getElementById('qNum').textContent = currentIdx + 1;
  document.getElementById('progFill').style.width = ((currentIdx / TOTAL) * 100).toFixed(1) + '%';
  document.getElementById('catBadge').textContent = p.cat;
  document.getElementById('catLabel').textContent = p.cat;
  document.getElementById('qtext').textContent = p.q;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('streakVal').textContent = streak;

  // Sequence
  const seq = document.getElementById('sequence');
  seq.innerHTML = '';
  p.items.forEach((item, i) => {
    if (i > 0) {
      const arr = document.createElement('div');
      arr.className = 'seq-arrow'; arr.textContent = '→';
      seq.appendChild(arr);
    }
    const el = itemEl(item);
    el.style.animationDelay = (i * 0.07) + 's';
    seq.appendChild(el);
  });
  // ? slot
  const arr2 = document.createElement('div');
  arr2.className = 'seq-arrow'; arr2.textContent = '→';
  seq.appendChild(arr2);
  const maxSz = Math.max(...p.items.map(x => x.size || 50));
  const slot = document.createElement('div');
  slot.className = 'seq-item qslot';
  slot.style.width = (maxSz + 14) + 'px';
  slot.style.height = (maxSz + 14) + 'px';
  slot.textContent = '?';
  seq.appendChild(slot);

  // Choices — shuffled but track answer
  const tagged = p.choices.map((c, i) => ({ item: c, isCorrect: i === p.ans }));
  const shuffled = shuffleArr(tagged);
  const choicesEl = document.getElementById('choices');
  const n = shuffled.length;
  choicesEl.className = 'choices ' + (n <= 2 ? 'g2' : n === 3 ? 'g3' : 'g4');
  choicesEl.innerHTML = '';
  shuffled.forEach(({ item, isCorrect }) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = renderItem(item);
    btn.addEventListener('click', () => handleChoice(btn, isCorrect, p, slot, item));
    choicesEl.appendChild(btn);
  });
}

function shuffleArr(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = 0 | Math.random() * (i + 1);
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function handleChoice(btn, isCorrect, p, slot, chosenItem) {
  if (answered) return;
  answered = true;
  try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); } catch (e) {}

  // disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  if (isCorrect) {
    btn.classList.add('correct');
    streak++; if (streak > maxStreak) maxStreak = streak; correctCount++;
    const pts = (hintUsed ? 5 : 10) + (streak > 2 ? 5 : 0);
    score += pts;
    playCorrect();

    // fill slot
    const sz = chosenItem.size || 50;
    slot.classList.remove('qslot');
    slot.style.width = (sz + 14) + 'px'; slot.style.height = (sz + 14) + 'px';
    slot.style.border = '2.5px solid var(--mint)';
    slot.style.background = 'rgba(6,214,160,.1)';
    slot.innerHTML = renderItem(chosenItem);

    // flash
    const fl = document.createElement('div'); fl.className = 'correct-flash';
    fl.textContent = streak > 3 ? '🔥' : streak > 1 ? '🌟' : '⭐';
    document.body.appendChild(fl); setTimeout(() => fl.remove(), 700);

    document.getElementById('scoreVal').textContent = score;
    document.getElementById('streakVal').textContent = streak;

    // Auto-advance bar
    const bw = document.getElementById('autoBarWrap');
    const bar = document.getElementById('autoBar');
    bw.classList.add('show');
    bar.style.animation = 'none'; void bar.offsetWidth;
    bar.style.animation = 'shrinkBar 1.5s linear forwards';
    autoTimer = setTimeout(nextPuzzle, 1600);

  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.getElementById('streakVal').textContent = 0;
    playWrong();

    // show correct
    document.querySelectorAll('.choice-btn').forEach(b => {
      // find and highlight correct
    });

    // show wrong modal
    const emojis = ['🤔', '😅', '💪', '🙈'];
    document.getElementById('fbEmoji').textContent = emojis[0 | Math.random() * 4];
    document.getElementById('fbSub').textContent = 'Doğru kural şuydu:';
    document.getElementById('fbRule').textContent = p.rule;
    document.getElementById('fbOverlay').classList.add('show');
  }
}

function closeFbAndNext() {
  document.getElementById('fbOverlay').classList.remove('show');
  nextPuzzle();
}

function nextPuzzle() {
  clearTimeout(autoTimer);
  currentIdx++;
  if (currentIdx >= TOTAL) {
    showWin();
  } else {
    loadPuzzle();
  }
}

function showHint() {
  hintUsed = true;
  document.getElementById('hintText').textContent = '💡 ' + PUZZLES[currentIdx].hint;
  document.getElementById('hintChip').style.display = 'none';
}

function showWin() {
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('wScore').textContent = score;
  document.getElementById('wCorrect').textContent = correctCount + '/' + TOTAL;
  document.getElementById('wStreak').textContent = maxStreak;

  const pct = Math.round(correctCount / TOTAL * 100);
  document.getElementById('winSub').textContent =
    `${TOTAL} soruyu bitirdin! Başarı: %${pct} 🎉`;
  document.getElementById('restartFromBtn').textContent =
    `↩ Kaldığım Yerden (Soru ${startIdx + 1})`;

  document.getElementById('winScreen').classList.add('show');
  playWinJingle();
}

/* ══ AUDIO ══ */
let audioCtx = null;
function getAC() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function tone(f, t, dur, vol = 0.2, t0 = 0) {
  try {
    const c = getAC(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination); o.type = t; o.frequency.value = f;
    g.gain.setValueAtTime(vol, c.currentTime + t0);
    g.gain.exponentialRampToValueAtTime(.001, c.currentTime + t0 + dur);
    o.start(c.currentTime + t0); o.stop(c.currentTime + t0 + dur + .05);
  } catch (e) {}
}
function playCorrect() { tone(523, 'sine', .1, .2, 0); tone(659, 'sine', .1, .2, .1); tone(784, 'sine', .2, .2, .2); }
function playWrong() { tone(300, 'sawtooth', .1, .14, 0); tone(220, 'sawtooth', .18, .14, .1); }
function playWinJingle() {
  [[523,0],[659,.15],[784,.3],[880,.48],[1047,.66],[784,.85],[1047,1.05],[1175,1.25],[1397,1.5]]
    .forEach(([f, s]) => tone(f, 'sine', .3, .2, s));
}

/* ══ STARS ══ */
(function () {
  const sf = document.getElementById('starField');
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const sz = .7 + Math.random() * 2;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;position:fixed;--d:${2+Math.random()*4}s;--dl:${Math.random()*6}s`;
    sf.appendChild(s);
  }
})();

// Start!
startGame();
</script>
