<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kural Bul! 🔍</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e2e; --card:#1a1840; --card2:#221f50;
  --gold:#ffd166; --mint:#06d6a0; --pink:#ff6b9d;
  --purple:#c084fc; --coral:#ff6b6b; --sky:#74c0fc;
  --text:#f0eeff; --muted:#9880bb; --border:rgba(255,255,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:18px 12px 60px;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 0%,#3d1060 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,#0a2050 0%,transparent 50%);
}

/* STARS */
.star{position:fixed;border-radius:50%;background:white;pointer-events:none;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.55}}

/* HEADER */
.title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.9rem,6vw,3rem); color:var(--gold);
  text-shadow:0 0 40px rgba(255,209,102,.5),3px 3px 0 rgba(0,0,0,.4);
  text-align:center; margin-bottom:5px; position:relative; z-index:1;
}
.subtitle{font-size:.88rem;color:var(--muted);font-weight:700;text-align:center;margin-bottom:14px;position:relative;z-index:1;}

/* SCORE BAR */
.score-bar{
  position:relative;z-index:1;
  display:flex;gap:14px;align-items:center;
  background:var(--card);border-radius:22px;
  padding:10px 22px;margin-bottom:12px;
  border:1.5px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.sc-v{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--gold);line-height:1;text-align:center;}
.sc-l{font-size:.64rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;text-align:center;}
.sc-d{width:2px;height:34px;background:var(--border);border-radius:2px;}
.lv-badge{font-size:.8rem;font-weight:900;padding:5px 14px;border-radius:14px;color:white;letter-spacing:.3px;background:linear-gradient(135deg,var(--purple),var(--pink));}

/* PROGRESS */
.prog-wrap{position:relative;z-index:1;display:flex;gap:7px;margin-bottom:14px;}
.pdot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .3s;}
.pdot.done{background:var(--mint);}
.pdot.current{background:var(--gold);transform:scale(1.35);box-shadow:0 0 8px var(--gold);}

/* PUZZLE CARD */
.puzzle-card{
  position:relative;z-index:1;
  background:var(--card);border-radius:28px;
  padding:22px 18px 20px;
  max-width:580px;width:100%;
  border:1.5px solid var(--border);
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 60px rgba(192,132,252,.1);
  margin-bottom:14px;
}
.qlabel{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--purple);margin-bottom:8px;}
.qtext{font-size:clamp(.9rem,2.8vw,1.05rem);font-weight:800;color:var(--text);margin-bottom:18px;line-height:1.5;}

/* SEQUENCE */
.sequence{
  display:flex;align-items:center;justify-content:center;
  gap:8px;flex-wrap:wrap;margin-bottom:20px;
}
.seq-item{
  display:flex;align-items:center;justify-content:center;
  border-radius:14px;background:var(--card2);
  border:2px solid rgba(255,255,255,.1);
  animation:itemReveal .4s cubic-bezier(.3,1.5,.5,1) both;
  position:relative;
}
@keyframes itemReveal{from{opacity:0;transform:scale(.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.seq-item.qslot{
  background:rgba(255,255,255,.04);
  border:2.5px dashed rgba(255,255,255,.25);
  color:rgba(255,255,255,.3);font-size:2rem;
}
.seq-arrow{color:var(--muted);font-size:1.1rem;font-weight:900;flex-shrink:0;}

/* HINT */
.hint-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(192,132,252,.12);border:1.5px solid rgba(192,132,252,.25);
  border-radius:18px;padding:5px 14px;
  font-size:.8rem;font-weight:800;color:var(--purple);
  cursor:pointer;transition:background .2s;margin-bottom:14px;
  font-family:'Nunito',sans-serif;
}
.hint-chip:hover{background:rgba(192,132,252,.22);}
.hint-text{font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:12px;line-height:1.4;min-height:18px;}

/* CHOICES */
.choices{display:grid;gap:10px;}
.choices.g2{grid-template-columns:repeat(2,1fr);}
.choices.g3{grid-template-columns:repeat(3,1fr);}
.choices.g4{grid-template-columns:repeat(4,1fr);}

.choice-btn{
  background:var(--card2);border:2.5px solid rgba(255,255,255,.1);
  border-radius:18px;padding:12px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  transition:all .15s;color:var(--text);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;
  min-height:80px;
}
.choice-btn:hover{transform:scale(1.05);border-color:var(--purple);box-shadow:0 4px 18px rgba(192,132,252,.3);}
.choice-btn.correct{border-color:var(--mint)!important;background:rgba(6,214,160,.15)!important;animation:cpop .4s ease;}
.choice-btn.wrong{border-color:var(--coral)!important;background:rgba(255,107,107,.1)!important;animation:cshake .4s ease;}
.choice-btn:disabled{pointer-events:none;}
@keyframes cpop{0%{transform:scale(1)}45%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes cshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* AUTO-ADVANCE BAR */
.auto-bar-wrap{
  position:relative;height:4px;background:rgba(255,255,255,.08);
  border-radius:2px;margin-top:12px;overflow:hidden;display:none;
}
.auto-bar-wrap.show{display:block;}
.auto-bar{height:100%;background:var(--mint);border-radius:2px;width:100%;
  animation:shrinkBar 1.6s linear forwards;}
@keyframes shrinkBar{from{width:100%}to{width:0%}}

/* FEEDBACK OVERLAY (wrong only) */
.fb-overlay{
  position:fixed;inset:0;z-index:100;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
}
.fb-overlay.show{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb-box{
  background:var(--card);border-radius:28px;padding:30px 36px;
  text-align:center;max-width:360px;width:90%;
  border:1.5px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:popIn .4s cubic-bezier(.3,1.5,.5,1);
}
@keyframes popIn{from{transform:scale(.65)}to{transform:scale(1)}}
.fb-emoji{font-size:3.8rem;display:block;margin-bottom:10px;}
.fb-title{font-family:'Fredoka One',cursive;font-size:1.9rem;margin-bottom:5px;}
.fb-title.ok{color:var(--mint);}
.fb-title.bad{color:var(--coral);}
.fb-sub{font-size:.88rem;font-weight:700;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.fb-rule{background:rgba(6,214,160,.1);border-radius:12px;padding:10px 14px;
  font-size:.84rem;font-weight:800;color:var(--text);line-height:1.5;margin-bottom:16px;text-align:left;}
.next-btn{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;
  padding:12px 28px;border:none;border-radius:16px;cursor:pointer;
  background:linear-gradient(135deg,var(--purple),var(--pink));color:white;
  box-shadow:0 4px 16px rgba(192,132,252,.4);transition:transform .15s;width:100%;
}
.next-btn:hover{transform:scale(1.05);}

/* WIN */
.win-screen{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
  background:rgba(20,8,40,.85);backdrop-filter:blur(14px);
}
.win-screen.show{display:flex;animation:fadeIn .5s ease;}
.win-box{
  background:var(--card);border-radius:32px;padding:40px 46px;
  text-align:center;max-width:400px;width:90%;
  border:2px solid rgba(255,209,102,.3);
  box-shadow:0 0 0 8px rgba(255,209,102,.06),0 20px 60px rgba(0,0,0,.6);
  animation:popIn .5s cubic-bezier(.3,1.5,.5,1);
}
.win-ada{
  font-family:'Fredoka One',cursive;
  font-size:clamp(3rem,10vw,5.5rem);
  background:linear-gradient(135deg,#ffd166,#ff6b9d,#c084fc,#06d6a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:adaPulse 1.4s ease infinite alternate;line-height:1;margin-bottom:6px;
}
@keyframes adaPulse{from{letter-spacing:0}to{letter-spacing:8px}}
.win-sub{font-size:1rem;font-weight:800;color:var(--muted);margin-bottom:20px;}
.win-stats{display:flex;gap:20px;justify-content:center;margin-bottom:22px;}
.wstat{display:flex;flex-direction:column;align-items:center;}
.wstat-v{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--gold);line-height:1;}
.wstat-l{font-size:.68rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.again-btn{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;
  padding:13px 34px;border:none;border-radius:20px;cursor:pointer;
  background:linear-gradient(135deg,var(--purple),var(--pink));color:white;
  box-shadow:0 4px 18px rgba(192,132,252,.4);transition:transform .15s;width:100%;
}
.again-btn:hover{transform:scale(1.07);}

/* BIG FEEDBACK (correct flash on card) */
.correct-flash{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:5rem;pointer-events:none;z-index:300;opacity:0;
  animation:bigFlash .7s ease forwards;
}
@keyframes bigFlash{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  40%{opacity:1;transform:translate(-50%,-60%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-90%) scale(.8)}
}

#fw{position:fixed;inset:0;pointer-events:none;z-index:199;}
</style>
</head>
<body>
<div id="starField"></div>

<div class="title">🔍 Kural Bul!</div>
<div class="subtitle">Diziyi incele → kuralı bul → doğruyu seç!</div>

<div class="score-bar">
  <div><div class="sc-v" id="scoreVal">0</div><div class="sc-l">Puan</div></div>
  <div class="sc-d"></div>
  <div><div class="sc-v" id="streakVal">0</div><div class="sc-l">Seri 🔥</div></div>
  <div class="sc-d"></div>
  <div class="lv-badge" id="lvBadge">Seviye 1</div>
</div>

<div class="prog-wrap" id="progWrap"></div>

<div class="puzzle-card" id="puzzleCard">
  <div class="qlabel">🧩 Sıradaki ne?</div>
  <div class="qtext" id="qtext"></div>
  <div class="sequence" id="sequence"></div>
  <div class="hint-chip" id="hintChip" onclick="showHint()">💡 İpucu</div>
  <div class="hint-text" id="hintText"></div>
  <div class="choices" id="choices"></div>
  <div class="auto-bar-wrap" id="autoBarWrap"><div class="auto-bar" id="autoBar"></div></div>
</div>

<!-- Wrong feedback modal -->
<div class="fb-overlay" id="fbOverlay">
  <div class="fb-box">
    <span class="fb-emoji" id="fbEmoji">😢</span>
    <div class="fb-title bad" id="fbTitle">Neredeyse!</div>
    <div class="fb-sub" id="fbSub"></div>
    <div class="fb-rule" id="fbRule"></div>
    <button class="next-btn" onclick="proceedNext()">Sıradaki →</button>
  </div>
</div>

<!-- Win screen -->
<div class="win-screen" id="winScreen">
  <canvas id="fw"></canvas>
  <div class="win-box">
    <div class="win-ada">Tebrikler Ada!</div>
    <div class="win-sub">Tüm bulmacaları çözdün! 🎉</div>
    <div class="win-stats">
      <div class="wstat"><div class="wstat-v" id="wScore">0</div><div class="wstat-l">Puan</div></div>
      <div class="wstat"><div class="wstat-v" id="wCorrect">0</div><div class="wstat-l">Doğru</div></div>
      <div class="wstat"><div class="wstat-v" id="wStreak">0</div><div class="wstat-l">En İyi Seri</div></div>
    </div>
    <button class="again-btn" onclick="startGame()">🔄 Tekrar Oyna</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   PUZZLE BANK  —  60+ puzzles, 5 categories of patterns
   Categories:
     colour   — renk dizisi
     shape    — şekil dizisi
     size     — boyut
     number   — sayı / aritmetik
     emoji    — hikaye / mevsim / hayvan serisi
     direction— yön döngüsü
     mixed    — renk + şekil kombinasyonu
     logic    — tek/çift, artış miktarı değişimi
═══════════════════════════════════════════════════════ */

// Item types:
//   {type:'emoji', v:'🐱'}
//   {type:'color', color:'#ff0000', size:44}
//   {type:'shape', shape:'circle|square|triangle|star|heart|diamond', color:'#x', size:N}
//   {type:'num',   v:7, color:'#ffd166'}
//   {type:'dots',  n:3, color:'#06d6a0'}
//   {type:'text',  v:'ABC', color:'#ff6b9d', size:N}   (for letter / word patterns)

function shapeHTML(shape, color, size) {
  const s=size, h=s/2;
  const star = ()=>{const pts=[];for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2,r=i%2?h*.38:h*.82;pts.push(`${h+r*Math.cos(a)},${h+r*Math.sin(a)}`);}return pts.join(' ');}
  const heart = ()=>`M${h},${s*.75} C${h},${s*.2} ${s*.1},${s*.1} ${s*.27},${s*.1} C${s*.45},${s*.1} ${h},${s*.38} ${h},${s*.38} C${h},${s*.38} ${s*.55},${s*.1} ${s*.73},${s*.1} C${s*.9},${s*.1} ${s*.9},${s*.2} ${s*.9},${s*.38} C${s*.9},${s*.72} ${h},${s*.88} ${h},${s*.88}Z`;
  const svgMap={
    circle:`<circle cx="${h}" cy="${h}" r="${h*.82}" fill="${color}"/>`,
    square:`<rect x="${s*.1}" y="${s*.1}" width="${s*.8}" height="${s*.8}" rx="${s*.1}" fill="${color}"/>`,
    triangle:`<polygon points="${h},${s*.08} ${s*.9},${s*.9} ${s*.1},${s*.9}" fill="${color}"/>`,
    star:`<polygon points="${star()}" fill="${color}"/>`,
    heart:`<path d="${heart()}" fill="${color}"/>`,
    diamond:`<polygon points="${h},${s*.08} ${s*.92},${h} ${h},${s*.92} ${s*.08},${h}" fill="${color}"/>`,
    pentagon:(()=>{const pts=[];for(let i=0;i<5;i++){const a=Math.PI*2/5*i-Math.PI/2;pts.push(`${h+h*.85*Math.cos(a)},${h+h*.85*Math.sin(a)}`);}return `<polygon points="${pts.join(' ')}" fill="${color}"/>`;})(),
    hexagon:(()=>{const pts=[];for(let i=0;i<6;i++){const a=Math.PI/3*i;pts.push(`${h+h*.85*Math.cos(a)},${h+h*.85*Math.sin(a)}`);}return `<polygon points="${pts.join(' ')}" fill="${color}"/>`;})(),
  };
  return `<svg viewBox="0 0 ${s} ${s}" width="${s}" height="${s}">${svgMap[shape]||svgMap.circle}</svg>`;
}

function dotsHTML(n, color, size) {
  const pos=[[1,1],[1,3],[3,1],[3,3],[2,2],[0,2],[4,2],[2,0],[2,4]];
  let svg=`<svg viewBox="0 0 5 5" width="${size}" height="${size}">`;
  for(let i=0;i<Math.min(n,9);i++){const[cx,cy]=pos[i];svg+=`<circle cx="${cx+.5}" cy="${cy+.5}" r=".38" fill="${color}"/>`;}
  return svg+'</svg>';
}

function renderItem(item){
  const sz = item.size||52;
  if(item.type==='emoji') return `<span style="font-size:${sz*.7}px;line-height:1">${item.v}</span>`;
  if(item.type==='shape') return shapeHTML(item.shape,item.color,sz);
  if(item.type==='num')   return `<span style="font-family:'Fredoka One',cursive;font-size:${sz*.55}px;color:${item.color||'#ffd166'};line-height:1">${item.v}</span>`;
  if(item.type==='dots')  return dotsHTML(item.n,item.color||'#06d6a0',sz);
  if(item.type==='text')  return `<span style="font-family:'Fredoka One',cursive;font-size:${sz*(item.fs||.45)}px;color:${item.color||'#ffd166'};line-height:1;text-align:center">${item.v}</span>`;
  if(item.type==='color') return `<div style="width:${sz}px;height:${sz}px;background:${item.color};border-radius:${sz*.15}px"></div>`;
  return '';
}

// Color palette shortcuts
const C={
  red:'#ef4444',orange:'#f97316',yellow:'#fbbf24',green:'#22c55e',
  blue:'#3b82f6',purple:'#a855f7',pink:'#f472b6',cyan:'#06b6d4',
  white:'#f0eeff',lime:'#84cc16',teal:'#14b8a6',rose:'#fb7185',
  gold:'#ffd166',mint:'#06d6a0',sky:'#74c0fc',lavender:'#c084fc'
};

const PUZZLES = [

/* ══ RENK DİZİSİ ══ */
{level:1,cat:'🎨 Renk Dizisi',
 q:'Renkler sırayla tekrar ediyor. Sıradaki hangisi?',
 items:[{type:'color',color:C.red,size:48},{type:'color',color:C.blue,size:48},{type:'color',color:C.red,size:48},{type:'color',color:C.blue,size:48}],
 choices:[{type:'color',color:C.red,size:46},{type:'color',color:C.blue,size:46},{type:'color',color:C.green,size:46},{type:'color',color:C.yellow,size:46}],
 correctIdx:0, hint:'Kırmızı-Mavi-Kırmızı-Mavi... sıradaki?',
 rule:'Kural: Kırmızı → Mavi → Kırmızı → Mavi → tekrar! 🔴🔵'},

{level:1,cat:'🎨 Renk Dizisi',
 q:'Gökkuşağı sırası! Sıradaki renk hangisi?',
 items:[{type:'color',color:C.red,size:48},{type:'color',color:C.orange,size:48},{type:'color',color:C.yellow,size:48},{type:'color',color:C.green,size:48}],
 choices:[{type:'color',color:C.purple,size:46},{type:'color',color:C.blue,size:46},{type:'color',color:C.pink,size:46},{type:'color',color:C.red,size:46}],
 correctIdx:1, hint:'Kırmızı, Turuncu, Sarı, Yeşil, ...',
 rule:'Kural: Gökkuşağı sırası! K-T-S-Y-M-L-M 🌈'},

{level:1,cat:'🎨 Renk Dizisi',
 q:'Üç renk tekrar ediyor. Sıradaki ne?',
 items:[{type:'color',color:C.pink,size:48},{type:'color',color:C.mint,size:48},{type:'color',color:C.gold,size:48},{type:'color',color:C.pink,size:48},{type:'color',color:C.mint,size:48}],
 choices:[{type:'color',color:C.pink,size:46},{type:'color',color:C.mint,size:46},{type:'color',color:C.gold,size:46},{type:'color',color:C.blue,size:46}],
 correctIdx:2, hint:'3\'lü grup tekrar ediyor — pembe, yeşil, sonra?',
 rule:'Kural: Pembe → Yeşil → Sarı → tekrar! 3\'lü döngü 🔄'},

/* ══ ŞEKİL DİZİSİ ══ */
{level:1,cat:'🔷 Şekil Dizisi',
 q:'Şekiller sırayla değişiyor. Sıradaki hangisi?',
 items:[{type:'shape',shape:'circle',color:C.purple,size:50},{type:'shape',shape:'square',color:C.purple,size:50},{type:'shape',shape:'triangle',color:C.purple,size:50},{type:'shape',shape:'circle',color:C.purple,size:50},{type:'shape',shape:'square',color:C.purple,size:50}],
 choices:[{type:'shape',shape:'triangle',color:C.purple,size:46},{type:'shape',shape:'circle',color:C.purple,size:46},{type:'shape',shape:'star',color:C.purple,size:46},{type:'shape',shape:'square',color:C.purple,size:46}],
 correctIdx:0, hint:'Daire-Kare-Üçgen... 3\'lü döngü!',
 rule:'Kural: Daire → Kare → Üçgen → tekrar! 🔴🟦🔺'},

{level:2,cat:'🔷 Şekil Dizisi',
 q:'Her adımda kenar sayısı artıyor! Sıradaki?',
 items:[{type:'shape',shape:'triangle',color:C.cyan,size:50},{type:'shape',shape:'square',color:C.cyan,size:50},{type:'shape',shape:'pentagon',color:C.cyan,size:50},{type:'shape',shape:'hexagon',color:C.cyan,size:50}],
 choices:[{type:'shape',shape:'circle',color:C.cyan,size:46},{type:'shape',shape:'triangle',color:C.cyan,size:46},{type:'shape',shape:'star',color:C.cyan,size:46},{type:'shape',shape:'diamond',color:C.cyan,size:46}],
 correctIdx:0, hint:'3 kenar, 4 kenar, 5 kenar, 6 kenar... sonsuz kenar = ?',
 rule:'Kural: Her adımda +1 kenar! Üçgen→Kare→Beşgen→Altıgen→Daire ⬡'},

{level:2,cat:'🔷 Şekil Dizisi',

/* ══════════════════════════════════════════
   GAME ENGINE
══════════════════════════════════════════ */
const GAME_SIZE = 10;
let gamePuzzles=[], idx=0, score=0, streak=0, maxStreak=0, correctCount=0;
let hintUsed=false, answered=false, autoTimer=null;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('fbOverlay').classList.remove('show');
  fireworksRunning=false; fwParts=[];
  score=0;streak=0;maxStreak=0;correctCount=0;idx=0;
  updateHUD();

  const byLv={1:[],2:[],3:[],4:[]};
  PUZZLES.forEach(p=>byLv[p.level]?.push(p));
  gamePuzzles=shuffle([
    ...shuffle(byLv[1]).slice(0,3),
    ...shuffle(byLv[2]).slice(0,3),
    ...shuffle(byLv[3]).slice(0,3),
    ...shuffle(byLv[4]).slice(0,2),
  ]).slice(0,GAME_SIZE);

  buildProg();
  loadPuzzle();
}

function buildProg(){
  const w=document.getElementById('progWrap');w.innerHTML='';
  gamePuzzles.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===idx?' current':'')+(i<idx?' done':'');
    w.appendChild(d);
  });
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('streakVal').textContent=streak;
  const p=gamePuzzles[idx];
  if(p){
    const lbs={1:'Seviye 1 ⭐',2:'Seviye 2 ⭐⭐',3:'Seviye 3 🔥',4:'Seviye 4 🧠'};
    document.getElementById('lvBadge').textContent=lbs[p.level]||'';
  }
}

function loadPuzzle(){
  clearTimeout(autoTimer);
  answered=false; hintUsed=false;
  document.getElementById('hintText').textContent='';
  document.getElementById('hintChip').style.display='inline-flex';
  document.getElementById('autoBarWrap').classList.remove('show');
  buildProg(); updateHUD();

  const p=gamePuzzles[idx];
  document.getElementById('qtext').textContent=p.cat+'  —  '+p.q;

  // Sequence
  const seq=document.getElementById('sequence');
  seq.innerHTML='';
  const seqItems=[...p.items];
  seqItems.forEach((item,i)=>{
    if(i>0){const arr=document.createElement('div');arr.className='seq-arrow';arr.textContent='→';seq.appendChild(arr);}
    const el=itemToEl(item);
    el.style.animationDelay=(i*.07)+'s';
    seq.appendChild(el);
  });
  // ? slot
  const arr2=document.createElement('div');arr2.className='seq-arrow';arr2.textContent='→';seq.appendChild(arr2);
  const slot=document.createElement('div');
  slot.className='seq-item qslot';
  const sz=Math.max(...seqItems.map(x=>x.size||52));
  slot.style.width=(sz+16)+'px';slot.style.height=(sz+16)+'px';
  slot.textContent='?';seq.appendChild(slot);

  // Choices — shuffle
  const shuffled=shuffle(p.choices.map((c,i)=>({item:c,isCorrect:i===p.correctIdx})));
  const choicesEl=document.getElementById('choices');
  const cols=shuffled.length<=2?'g2':shuffled.length===3?'g3':'g4';
  choicesEl.className='choices '+cols;
  choicesEl.innerHTML='';
  shuffled.forEach(({item,isCorrect})=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=renderItem(item);
    btn.addEventListener('click',()=>handleChoice(btn,isCorrect,p,slot));
    choicesEl.appendChild(btn);
  });
}

function itemToEl(item){
  const sz=item.size||52;
  const el=document.createElement('div');
  el.className='seq-item';
  el.style.width=(sz+16)+'px';el.style.height=(sz+16)+'px';
  el.innerHTML=renderItem(item);
  return el;
}

function handleChoice(btn,isCorrect,p,slot){
  if(answered)return;
  answered=true;
  try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioCtx.resume();}catch(e){}

  if(isCorrect){
    btn.classList.add('correct');
    streak++;if(streak>maxStreak)maxStreak=streak;correctCount++;
    const pts=(hintUsed?5:(p.level*10))+(streak>2?5:0);
    score+=pts;
    playCorrect();

    // Fill slot
    const item=p.choices[p.correctIdx];
    const sz=item.size||52;
    slot.classList.remove('qslot');
    slot.style.width=(sz+16)+'px';slot.style.height=(sz+16)+'px';
    slot.style.border='2.5px solid var(--mint)';
    slot.style.background='rgba(6,214,160,.1)';
    slot.innerHTML=renderItem(item);
    slot.style.animation='itemReveal .4s cubic-bezier(.3,1.5,.5,1)';

    // Big correct flash
    const fl=document.createElement('div');fl.className='correct-flash';
    fl.textContent=['⭐','🌟','💫','🎉','🔥'][Math.min(streak-1,4)]||'⭐';
    document.body.appendChild(fl);setTimeout(()=>fl.remove(),800);

    updateHUD();

    // Auto-advance bar
    const bw=document.getElementById('autoBarWrap');
    const bar=document.getElementById('autoBar');
    bw.classList.add('show');
    bar.style.animation='none';void bar.offsetWidth;
    bar.style.animation='shrinkBar 1.6s linear forwards';

    autoTimer=setTimeout(()=>{
      bw.classList.remove('show');
      nextPuzzle();
    },1700);

  } else {
    btn.classList.add('wrong');
    streak=0;
    document.getElementById('streakVal').textContent=0;
    playWrong();
    updateHUD();

    // Show modal with explanation
    const emojis=['🤔','😅','💪','🙈'];
    document.getElementById('fbEmoji').textContent=emojis[0|Math.random()*4];
    document.getElementById('fbTitle').textContent=['Neredeyse!','Bir daha!','Şaşırtıcı!','Yaklaştın!'][0|Math.random()*4];
    document.getElementById('fbTitle').className='fb-title bad';
    document.getElementById('fbSub').textContent='Doğru cevabı ve kuralı gör:';
    document.getElementById('fbRule').textContent=p.rule;
    document.getElementById('fbOverlay').classList.add('show');
  }
}

function proceedNext(){
  document.getElementById('fbOverlay').classList.remove('show');
  nextPuzzle();
}

function nextPuzzle(){
  clearTimeout(autoTimer);
  idx++;
  if(idx>=gamePuzzles.length) showWin();
  else loadPuzzle();
}

function showHint(){
  hintUsed=true;
  document.getElementById('hintText').textContent='💡 '+gamePuzzles[idx].hint;
  document.getElementById('hintChip').style.display='none';
}

function showWin(){
  document.getElementById('wScore').textContent=score;
  document.getElementById('wCorrect').textContent=correctCount+'/'+gamePuzzles.length;
  document.getElementById('wStreak').textContent=maxStreak;
  document.getElementById('winScreen').classList.add('show');
  fireworksRunning=true;startFireworks();playWinJingle();
}

/* ══ AUDIO ══ */
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,t,dur,vol=0.2,t0=0){
  try{const c=getAC(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(vol,c.currentTime+t0);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t0+dur);
    o.start(c.currentTime+t0);o.stop(c.currentTime+t0+dur+.05);
  }catch(e){}
}
function playCorrect(){tone(523,'sine',.1,.2,0);tone(659,'sine',.1,.2,.1);tone(784,'sine',.22,.22,.2);}
function playWrong(){tone(300,'sawtooth',.1,.14,0);tone(220,'sawtooth',.18,.14,.1);}
function playWinJingle(){
  [[523,0],[659,.15],[784,.3],[880,.48],[1047,.66],[784,.85],[1047,1.05],[1175,1.25],[1397,1.5]]
    .forEach(([f,s])=>tone(f,'sine',.3,.2,s));
}

/* ══ FIREWORKS ══ */
const fwCanvas=document.getElementById('fw');
const fwCtx=fwCanvas.getContext('2d');
let fwParts=[],fireworksRunning=false,fwTimer;
function resizeFW(){fwCanvas.width=window.innerWidth;fwCanvas.height=window.innerHeight;}
resizeFW();window.addEventListener('resize',resizeFW);
function spawnFW(){
  const x=Math.random()*fwCanvas.width,y=20+Math.random()*fwCanvas.height*.5;
  const cols=['#ffd166','#ff6b9d','#c084fc','#06d6a0','#ff6b6b','#74c0fc'];
  const col=cols[0|Math.random()*cols.length];
  for(let i=0;i<55;i++){
    const a=Math.PI*2/55*i+Math.random()*.2,s=2+Math.random()*5;
    fwParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,alpha:1,color:col,size:1.5+Math.random()*2.5,decay:.013+Math.random()*.01,gravity:.065});
  }
}
function animateFW(){
  if(!fireworksRunning){fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);return;}
  fwCtx.fillStyle='rgba(15,14,46,.12)';fwCtx.fillRect(0,0,fwCanvas.width,fwCanvas.height);
  fwParts=fwParts.filter(p=>p.alpha>.01);
  fwParts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.985;p.alpha-=p.decay;
    fwCtx.save();fwCtx.globalAlpha=p.alpha;fwCtx.fillStyle=p.color;
    fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.size,0,Math.PI*2);fwCtx.fill();fwCtx.restore();
  });
  requestAnimationFrame(animateFW);
}
function startFireworks(){
  fwParts=[];animateFW();
  fwTimer=setInterval(()=>{if(!fireworksRunning){clearInterval(fwTimer);return;}spawnFW();if(Math.random()<.4)spawnFW();},380);
}

  const sf=document.getElementById('starField');

    const s=document.createElement('div');s.className='star';

    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;position:fixed;--d:${2+Math.random()*4}s;--dl:${Math.random()*6}s`;
    sf.appendChild(s);
  }
})();

startGame();
