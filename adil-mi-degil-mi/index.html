<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adil mi Değil mi? 🤔</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #fef9f0;
  --card:    #ffffff;
  --fair:    #22c55e;
  --unfair:  #f43f5e;
  --yellow:  #fbbf24;
  --blue:    #3b82f6;
  --purple:  #a855f7;
  --teal:    #14b8a6;
  --orange:  #f97316;
  --text:    #1e1a2e;
  --muted:   #8b7fa0;
  --border:  #e8e0f5;
  --soft:    #f5f0ff;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Nunito', sans-serif;
  background: var(--bg);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:16px 12px 60px;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 10% 15%, #fde8ff 0%, transparent 45%),
    radial-gradient(ellipse at 90% 85%, #e0f2ff 0%, transparent 45%),
    radial-gradient(ellipse at 55% 50%, #fff8e0 0%, transparent 55%);
}

/* ── FLOATING BUBBLES ── */
.bubble {
  position:fixed; border-radius:50%; pointer-events:none; opacity:.07;
  animation: bubbleFloat var(--d,8s) ease-in-out infinite var(--dl,0s);
}
@keyframes bubbleFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-30px) scale(1.05)} }

/* ── HEADER ── */
.title-wrap { position:relative; z-index:1; text-align:center; margin-bottom:5px; }
.title {
  font-family:'Baloo 2', cursive;
  font-size: clamp(2.1rem,6.5vw,3.2rem);
  font-weight:900;
  background: linear-gradient(135deg, #f43f5e, #a855f7, #3b82f6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,.06));
}
.subtitle { font-size:.88rem; color:var(--muted); font-weight:700; margin-bottom:14px; text-align:center; position:relative; z-index:1; }

/* ── SCORE ── */
.score-bar {
  position:relative; z-index:1;
  display:flex; gap:12px; align-items:center;
  background:var(--card); border-radius:22px;
  padding:9px 20px; margin-bottom:12px;
  border:2px solid var(--border);
  box-shadow:0 4px 18px rgba(168,85,247,.1);
}
.sc-v { font-family:'Baloo 2',cursive; font-size:1.5rem; font-weight:900; color:var(--purple); line-height:1; text-align:center; }
.sc-l { font-size:.64rem; font-weight:900; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; text-align:center; }
.sc-d { width:2px; height:32px; background:var(--border); border-radius:2px; }
.cat-badge {
  font-size:.78rem; font-weight:900; padding:5px 13px; border-radius:14px;
  color:white; letter-spacing:.2px;
}
.cat-school  { background:linear-gradient(135deg,#3b82f6,#06b6d4); }
.cat-play    { background:linear-gradient(135deg,#22c55e,#14b8a6); }
.cat-family  { background:linear-gradient(135deg,#f97316,#f59e0b); }
.cat-friends { background:linear-gradient(135deg,#a855f7,#ec4899); }
.cat-rules   { background:linear-gradient(135deg,#ef4444,#f97316); }

/* ── PROGRESS ── */
.prog { position:relative; z-index:1; display:flex; gap:7px; margin-bottom:12px; }
.pdot { width:12px; height:12px; border-radius:50%; background:rgba(0,0,0,.08); transition:all .35s; }
.pdot.done    { background:var(--fair); }
.pdot.current { background:var(--yellow); transform:scale(1.35); box-shadow:0 0 9px var(--yellow); }

/* ── PUZZLE CARD ── */
.puzzle-card {
  position:relative; z-index:1;
  background:var(--card);
  border-radius:30px; padding:24px 20px 22px;
  max-width:580px; width:100%;
  border:2px solid var(--border);
  box-shadow:0 8px 36px rgba(168,85,247,.1), 0 2px 6px rgba(0,0,0,.04);
  margin-bottom:14px;
  overflow:hidden;
}
/* Decorative top stripe */
.puzzle-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  border-radius:28px 28px 0 0;
}
.card-school::before  { background:linear-gradient(90deg,#3b82f6,#06b6d4); }
.card-play::before    { background:linear-gradient(90deg,#22c55e,#14b8a6); }
.card-family::before  { background:linear-gradient(90deg,#f97316,#f59e0b); }
.card-friends::before { background:linear-gradient(90deg,#a855f7,#ec4899); }
.card-rules::before   { background:linear-gradient(90deg,#ef4444,#f97316); }

.cat-label { font-size:.72rem; font-weight:900; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:8px; }

/* ── SCENE ── */
.scene-box {
  background:var(--soft); border-radius:20px;
  padding:18px 16px; margin-bottom:20px;
  border:1.5px solid var(--border);
  display:flex; flex-direction:column; gap:14px;
}

/* Characters row */
.chars-row {
  display:flex; align-items:flex-end; justify-content:center;
  gap:0; position:relative; min-height:110px;
}
.char-wrap {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  position:relative; animation: charReveal .5s cubic-bezier(.3,1.5,.5,1) both;
}
@keyframes charReveal { from{opacity:0;transform:scale(.4) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

.char-body {
  position:relative;
  display:flex; flex-direction:column; align-items:center;
}
.char-emoji {
  font-size:3.2rem; line-height:1;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.15));
  transition:transform .3s;
}
.char-wrap:hover .char-emoji { transform:scale(1.12) rotate(-5deg); }

/* Speech bubble */
.speech {
  position:absolute;
  background:white;
  border-radius:14px;
  border:2px solid var(--border);
  padding:6px 10px;
  font-size:.72rem; font-weight:800; color:var(--text);
  white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  animation:bubblePop .4s cubic-bezier(.3,1.6,.5,1) .3s both;
  z-index:2;
}
@keyframes bubblePop { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
.speech::after {
  content:''; position:absolute; bottom:-8px; left:50%;
  transform:translateX(-50%);
  border-left:7px solid transparent; border-right:7px solid transparent;
  border-top:8px solid white;
}
.speech.left-bubble  { left:-10px; bottom:110%; transform:none; }
.speech.right-bubble { right:-10px; bottom:110%; transform:none; }
.speech.top-bubble   { bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); }
.speech.left-bubble::after  { left:20px; }
.speech.right-bubble::after { left:auto; right:20px; }

.char-name {
  font-size:.72rem; font-weight:900; color:var(--muted);
  text-transform:uppercase; letter-spacing:.4px;
}
.char-item {
  font-size:1.6rem; margin-top:2px;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.12));
}

/* scene divider */
.scene-divider {
  border:none; border-top:1.5px dashed var(--border); margin:2px 0;
}

/* Situation text */
.situation {
  font-size:clamp(.92rem,2.8vw,1.05rem);
  font-weight:800; color:var(--text); line-height:1.55;
  text-align:center;
}

/* ── CHOICE BUTTONS ── */
.choice-row {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;
}
.choice-btn {
  border:none; border-radius:22px; padding:18px 14px;
  cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;
  transition:transform .15s, box-shadow .15s;
  font-family:'Baloo 2',cursive; font-weight:900;
}
.btn-fair {
  background:linear-gradient(155deg,#d1fae5,#a7f3d0);
  border:2.5px solid #6ee7b7;
  color:#065f46;
  box-shadow:0 4px 14px rgba(34,197,94,.2);
}
.btn-unfair {
  background:linear-gradient(155deg,#ffe4e6,#fecdd3);
  border:2.5px solid #fca5a5;
  color:#881337;
  box-shadow:0 4px 14px rgba(244,63,94,.18);
}
.choice-btn:hover { transform:translateY(-4px) scale(1.04); box-shadow:0 10px 28px rgba(0,0,0,.13); }
.choice-btn.selected-correct { animation:btnPop .4s ease; }
.choice-btn.selected-wrong   { animation:btnShake .4s ease; }
@keyframes btnPop   { 0%{transform:scale(1)} 45%{transform:scale(1.08)} 100%{transform:scale(1)} }
@keyframes btnShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
.btn-icon { font-size:2.6rem; }
.btn-label { font-size:1.05rem; }
.btn-sub   { font-size:.72rem; font-weight:700; opacity:.7; }

/* ── HINT ── */
.hint-row { display:flex; align-items:center; gap:10px; }
.hint-btn {
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(168,85,247,.09); border:1.5px solid rgba(168,85,247,.22);
  border-radius:18px; padding:5px 14px;
  font-size:.8rem; font-weight:800; color:var(--purple);
  cursor:pointer; font-family:'Nunito',sans-serif; transition:background .2s;
}
.hint-btn:hover { background:rgba(168,85,247,.18); }
.hint-text { font-size:.82rem; font-weight:700; color:var(--orange); line-height:1.4; }

/* ── FEEDBACK ── */
.fb-overlay {
  position:fixed; inset:0; z-index:100;
  display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,.42); backdrop-filter:blur(10px);
}
.fb-overlay.show { display:flex; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.fb-box {
  background:var(--card); border-radius:30px; padding:32px 36px;
  text-align:center; max-width:400px; width:92%;
  border:2px solid var(--border);
  box-shadow:0 16px 50px rgba(168,85,247,.18);
  animation:popIn .42s cubic-bezier(.3,1.5,.5,1);
  position:relative; overflow:hidden;
}
@keyframes popIn { from{transform:scale(.6)} to{transform:scale(1)} }

.fb-top-stripe { position:absolute; top:0; left:0; right:0; height:6px; border-radius:28px 28px 0 0; }
.fb-top-fair   { background:linear-gradient(90deg,#22c55e,#14b8a6); }
.fb-top-unfair { background:linear-gradient(90deg,#f43f5e,#f97316); }

.fb-emoji { font-size:4.5rem; display:block; margin:6px 0 10px; animation:spinIn .5s ease; }
@keyframes spinIn { from{transform:rotate(-15deg) scale(.5)} to{transform:scale(1) rotate(0)} }
.fb-verdict {
  display:inline-flex; align-items:center; gap:7px;
  padding:7px 20px; border-radius:20px; font-size:1rem; font-weight:900;
  margin-bottom:12px;
}
.verdict-fair   { background:#d1fae5; color:#065f46; }
.verdict-unfair { background:#ffe4e6; color:#881337; }
.fb-title { font-family:'Baloo 2',cursive; font-size:1.85rem; font-weight:900; margin-bottom:5px; }
.fb-title.ok  { color:var(--fair); }
.fb-title.bad { color:var(--unfair); }
.fb-sub   { font-size:.88rem; font-weight:700; color:var(--muted); margin-bottom:12px; line-height:1.4; }
.fb-why {
  background:var(--soft); border-radius:16px; padding:13px 16px;
  font-size:.86rem; font-weight:700; color:var(--text); line-height:1.6;
  margin-bottom:16px; text-align:left; border-left:4px solid var(--purple);
}
.fb-lesson {
  background:#fffbeb; border-radius:14px; padding:10px 14px;
  font-size:.82rem; font-weight:700; color:#92400e; line-height:1.5;
  margin-bottom:16px; text-align:left;
}
.next-btn {
  font-family:'Baloo 2',cursive; font-weight:900; font-size:1rem;
  padding:12px 30px; border:none; border-radius:18px; cursor:pointer;
  background:linear-gradient(135deg,#a855f7,#ec4899); color:white;
  box-shadow:0 4px 16px rgba(168,85,247,.35); transition:transform .15s;
}
.next-btn:hover { transform:scale(1.07); }

/* ── WIN ── */
.win-screen {
  position:fixed; inset:0; z-index:200;
  display:none; align-items:center; justify-content:center;
  background:rgba(254,249,240,.9); backdrop-filter:blur(16px);
}
.win-screen.show { display:flex; animation:fadeIn .5s ease; }
.win-box {
  background:var(--card); border-radius:32px; padding:40px 48px;
  text-align:center; max-width:420px; width:92%;
  border:3px solid var(--yellow);
  box-shadow:0 0 0 10px rgba(251,191,36,.08), 0 20px 60px rgba(168,85,247,.15);
  animation:popIn .5s cubic-bezier(.3,1.5,.5,1);
}
.win-ada {
  font-family:'Baloo 2',cursive; font-weight:900;
  font-size:clamp(3rem,11vw,5.5rem);
  background:linear-gradient(135deg,#f43f5e,#a855f7,#3b82f6,#22c55e);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:adaPulse 1.4s ease infinite alternate; line-height:1; margin-bottom:6px;
}
@keyframes adaPulse { from{letter-spacing:0} to{letter-spacing:7px} }
.win-sub  { font-size:1rem; font-weight:800; color:var(--muted); margin-bottom:20px; }
.win-badge {
  display:inline-flex; align-items:center; gap:8px;
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  border-radius:20px; padding:10px 22px; margin-bottom:20px;
  font-size:1rem; font-weight:900; color:#92400e;
  box-shadow:0 4px 14px rgba(251,191,36,.3);
}
.win-stats { display:flex; gap:20px; justify-content:center; margin-bottom:22px; }
.wstat   { display:flex; flex-direction:column; align-items:center; }
.wstat-v { font-family:'Baloo 2',cursive; font-weight:900; font-size:2.2rem; color:var(--purple); line-height:1; }
.wstat-l { font-size:.68rem; font-weight:900; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.again-btn {
  font-family:'Baloo 2',cursive; font-weight:900; font-size:1.05rem;
  padding:13px 34px; border:none; border-radius:20px; cursor:pointer;
  background:linear-gradient(135deg,#a855f7,#ec4899); color:white;
  box-shadow:0 4px 18px rgba(168,85,247,.4); transition:transform .15s;
}
.again-btn:hover { transform:scale(1.07); }

#fw { position:fixed; inset:0; pointer-events:none; z-index:199; }

@media(max-width:400px){
  .puzzle-card{padding:18px 12px 16px;}
  .fb-box,.win-box{padding:26px 18px;}
  .char-emoji{font-size:2.6rem;}
}
</style>
</head>
<body>

<!-- background bubbles -->
<div class="bubble" style="width:220px;height:220px;background:#f43f5e;left:-60px;top:10%;--d:7s;--dl:0s"></div>
<div class="bubble" style="width:180px;height:180px;background:#a855f7;right:-50px;top:30%;--d:9s;--dl:2s"></div>
<div class="bubble" style="width:150px;height:150px;background:#3b82f6;left:20%;bottom:15%;--d:8s;--dl:1s"></div>
<div class="bubble" style="width:130px;height:130px;background:#22c55e;right:15%;bottom:25%;--d:6s;--dl:3s"></div>

<div class="title-wrap">
  <div class="title">🤔 Adil mi, Değil mi?</div>
</div>
<div class="subtitle">Hikayeyi oku → ne hissettiğini düşün → karar ver!</div>

<div class="score-bar">
  <div><div class="sc-v" id="scV">0</div><div class="sc-l">Puan</div></div>
  <div class="sc-d"></div>
  <div><div class="sc-v" id="stV">0</div><div class="sc-l">Seri 🔥</div></div>
  <div class="sc-d"></div>
  <div class="cat-badge cat-friends" id="catBadge">Arkadaşlar</div>
</div>

<div class="prog" id="prog"></div>

<div class="puzzle-card card-friends" id="puzzleCard">
  <div class="cat-label" id="catLabel">👫 Arkadaşlar</div>
  <div class="scene-box">
    <div class="chars-row" id="charsRow"></div>
    <hr class="scene-divider">
    <div class="situation" id="situation">Yükleniyor...</div>
  </div>
  <div class="choice-row">
    <button class="choice-btn btn-fair"   id="btnFair"   onclick="handleChoice(true)">
      <span class="btn-icon">✅</span>
      <span class="btn-label">ADİL!</span>
      <span class="btn-sub">Bu doğru</span>
    </button>
    <button class="choice-btn btn-unfair" id="btnUnfair" onclick="handleChoice(false)">
      <span class="btn-icon">❌</span>
      <span class="btn-label">ADİL DEĞİL!</span>
      <span class="btn-sub">Bu yanlış</span>
    </button>
  </div>
  <div class="hint-row">
    <button class="hint-btn" id="hintBtn" onclick="showHint()">💭 İpucu</button>
    <div class="hint-text" id="hintText"></div>
  </div>
</div>

<!-- Feedback -->
<div class="fb-overlay" id="fbOverlay">
  <div class="fb-box">
    <div class="fb-top-stripe fb-top-fair" id="fbStripe"></div>
    <span class="fb-emoji" id="fbEmoji">⭐</span>
    <div class="fb-verdict" id="fbVerdict"><span></span></div>
    <div class="fb-title" id="fbTitle">Harika!</div>
    <div class="fb-sub"   id="fbSub"></div>
    <div class="fb-why"   id="fbWhy"></div>
    <div class="fb-lesson" id="fbLesson"></div>
    <button class="next-btn" id="nextBtn" onclick="nextPuzzle()">Sıradaki →</button>
  </div>
</div>

<!-- Win -->
<div class="win-screen" id="winScreen">
  <canvas id="fw"></canvas>
  <div class="win-box">
    <div class="win-ada">Tebrikler Ada!</div>
    <div class="win-sub">Harika kararlar verdin! 🌟</div>
    <div class="win-badge">🏅 Adalet Dedektifi Rozeti Kazandın!</div>
    <div class="win-stats">
      <div class="wstat"><div class="wstat-v" id="wSc">0</div><div class="wstat-l">Puan</div></div>
      <div class="wstat"><div class="wstat-v" id="wCo">0</div><div class="wstat-l">Doğru</div></div>
      <div class="wstat"><div class="wstat-v" id="wSt">0</div><div class="wstat-l">En İyi Seri</div></div>
    </div>
    <button class="again-btn" onclick="startGame()">Tekrar Oyna 🔄</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   PUZZLE BANK
   Each puzzle:
     category  : 'friends' | 'school' | 'family' | 'play' | 'rules'
     catLabel  : display string
     catEmoji  : icon
     cardClass : CSS card class
     chars     : [ { emoji, name, item?, speech?, pos:'left'|'right'|'center', anim? } ]
     situation : the scenario text
     isFair    : true/false
     hint      : clue text
     why       : explanation of verdict
     lesson    : takeaway / value message
     level     : 1-4
══════════════════════════════════════════════════ */
const PUZZLES = [

  /* ── FRIENDS ── */
  {
    category:'friends', catLabel:'Arkadaşlar', catEmoji:'👫', cardClass:'card-friends', level:1,
    chars:[
      { emoji:'👧', name:'Elif', speech:'Ben oynayamam mı?', pos:'left' },
      { emoji:'👦', name:'Can',  speech:'Hayır, seni almıyoruz!', pos:'right' },
      { emoji:'👦', name:'Arda', pos:'center' },
    ],
    situation:'Can ve Arda bahçede top oynuyor. Elif de oynamak istiyor ama Can "Seni almıyoruz, sen kız!" diyor.',
    isFair: false,
    hint:'Herkesin oyun oynamaya hakkı var mı?',
    why:'❌ Adil değil! Herkesin oyuna katılma hakkı vardır. "Sen kız" diye birini dışlamak çok yanlış. Oyun herkese açık olmalı.',
    lesson:'💛 Öğrenilecek şey: Arkadaşlarımızı cinsiyetleri, görünüşleri veya başka özellikleri yüzünden dışlamamalıyız.'
  },
  {
    category:'friends', catLabel:'Arkadaşlar', catEmoji:'👫', cardClass:'card-friends', level:1,
    chars:[
      { emoji:'👧', name:'Selin', speech:'Al senin payın!', pos:'left', item:'🍪' },
      { emoji:'👦', name:'Mert',  speech:'Teşekkürler!', pos:'right' },
    ],
    situation:'Selin yanında 4 tane kurabiyesi var. Mert\'in hiç kurabiyesi yok. Selin "Al, ikisini sana veriyorum" diyor.',
    isFair: true,
    hint:'Paylaşmak adaletli bir davranış mıdır?',
    why:'✅ Adil! Selin sahip olduklarını paylaşıyor. Mert\'in hiç olmaması yerine ikisi de ikişer tane aldı. Paylaşmak güzel!',
    lesson:'💛 Öğrenilecek şey: Paylaşmak hem adaletli hem de başkalarını mutlu eden güzel bir davranıştır.'
  },
  {
    category:'friends', catLabel:'Arkadaşlar', catEmoji:'👫', cardClass:'card-friends', level:2,
    chars:[
      { emoji:'👦', name:'Ali',  speech:'Benim sıram!', pos:'left' },
      { emoji:'👦', name:'Berk', speech:'Hayır, ben atladım!', pos:'center' },
      { emoji:'👧', name:'Zeynep', pos:'right' },
    ],
    situation:'Oyun parkında kaydırak sırası var. Ali sıraya ilk girdi. Berk Ali\'nin önüne geçti ve "Benim arkadaşım Zeynep sırayı tutuyor!" diyor.',
    isFair: false,

      { emoji:'👩‍🏫', name:'Öğretmen', speech:'Neden düşünüyorsun?', pos:'right' },
    ],
    situation:'Beril, sınıftaki bir kuralın gereksiz olduğunu düşünüyor. Bağırıp kuralı bozmak yerine öğretmenine gidip "Bu kural neden var, tartışabilir miyiz?" diyor.',
    isFair: true,
    hint:'Bir kuralı beğenmiyorsan onu bozmak mı, yoksa konuşarak değiştirmeye çalışmak mı adil?',
    why:'✅ Çok olgun bir davranış! Kuralı beğenmeyince bozmak yerine sormak, tartışmak ve değişim için konuşmak — demokratik ve adil yol bu.',
    lesson:'💛 Öğrenilecek şey: Katılmadığın kurallara sesini yükselt — ama diyalog kurarak. Bu demokratik düşünme becerisidir!'
  },
];

/* ══ CATEGORY CONFIG ══ */
const CAT_CONF = {
  friends: { badge:'cat-friends', emoji:'👫' },
  school:  { badge:'cat-school',  emoji:'🏫' },
  family:  { badge:'cat-family',  emoji:'👨‍👩‍👧' },
  play:    { badge:'cat-play',    emoji:'🎮' },
  rules:   { badge:'cat-rules',   emoji:'📏' },
};

/* ══ GAME STATE ══ */
const GAME_SIZE = 10;
let gamePuzzles=[], idx=0, score=0, streak=0, maxStreak=0, correctCount=0, hintUsed=false, answered=false;

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; }

function startGame() {
  document.getElementById('winScreen').classList.remove('show');
  fireworksRunning=false; fwParts=[];
  score=0; streak=0; maxStreak=0; correctCount=0; idx=0;
  updateHUD();

  // balanced pick across categories
  const byCat={friends:[],school:[],family:[],play:[],rules:[]};
  PUZZLES.forEach(p=>byCat[p.category]?.push(p));
  gamePuzzles = shuffle([
    ...shuffle(byCat.friends).slice(0,2),
    ...shuffle(byCat.school).slice(0,2),
    ...shuffle(byCat.family).slice(0,2),
    ...shuffle(byCat.play).slice(0,2),
    ...shuffle(byCat.rules).slice(0,2),
  ]).slice(0,GAME_SIZE);

  buildProg();
  loadPuzzle();
}

function buildProg() {
  const w=document.getElementById('prog'); w.innerHTML='';
  gamePuzzles.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===idx?' current':'')+(i<idx?' done':'');
    w.appendChild(d);
  });
}

function updateHUD() {
  document.getElementById('scV').textContent=score;
  document.getElementById('stV').textContent=streak;
  const p=gamePuzzles[idx];
  if(!p) return;
  const cc=CAT_CONF[p.category];
  const badge=document.getElementById('catBadge');
  badge.textContent=cc.emoji+' '+p.catLabel;
  badge.className='cat-badge '+cc.badge;
}

function loadPuzzle() {
  hintUsed=false; answered=false;
  document.getElementById('hintText').textContent='';
  document.getElementById('hintBtn').style.display='inline-flex';
  document.getElementById('btnFair').disabled=false;
  document.getElementById('btnUnfair').disabled=false;
  buildProg(); updateHUD();

  const p=gamePuzzles[idx];

  // card class
  const card=document.getElementById('puzzleCard');
  card.className='puzzle-card '+p.cardClass;

  document.getElementById('catLabel').textContent=p.catEmoji+' '+p.catLabel+' — Seviye '+p.level;
  document.getElementById('situation').textContent=p.situation;

  // Build characters
  const row=document.getElementById('charsRow');
  row.innerHTML='';
  const positions={left:'left',center:'center',right:'right'};

  p.chars.forEach((ch,i)=>{
    const wrap=document.createElement('div');
    wrap.className='char-wrap';
    wrap.style.animationDelay=(i*0.12)+'s';
    wrap.style.flex='1';
    wrap.style.maxWidth='120px';

    let html='<div class="char-body">';
    if(ch.speech){
      html+=`<div class="speech top-bubble">${ch.speech}</div>`;
    }
    html+=`<div class="char-emoji">${ch.emoji}</div>`;
    html+='</div>';
    if(ch.item) html+=`<div class="char-item">${ch.item}</div>`;
    html+=`<div class="char-name">${ch.name}</div>`;
    wrap.innerHTML=html;
    row.appendChild(wrap);
  });
}

function handleChoice(userSaysFair) {
  if(answered) return;
  answered=true;
  document.getElementById('btnFair').disabled=true;
  document.getElementById('btnUnfair').disabled=true;
  try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioCtx.resume();}catch(e){}

  const p=gamePuzzles[idx];
  const isCorrect=(userSaysFair===p.isFair);

  const clickedBtn=document.getElementById(userSaysFair?'btnFair':'btnUnfair');
  clickedBtn.classList.add(isCorrect?'selected-correct':'selected-wrong');

  if(isCorrect){
    streak++; if(streak>maxStreak) maxStreak=streak; correctCount++;
    const pts=(hintUsed?5:p.level*10)+(streak>2?5:0);
    score+=pts;
    playCorrect();
    showFB(true,p,pts,userSaysFair);
  } else {
    streak=0;
    playWrong();
    showFB(false,p,0,p.isFair); // show what was correct
  }
  updateHUD();
}

function showFB(ok,p,pts,fairAnswer) {
  const isFairAnswer = p.isFair;
  document.getElementById('fbStripe').className='fb-top-stripe '+(isFairAnswer?'fb-top-fair':'fb-top-unfair');

  const okEmojis=['🌟','⭐','🏆','🔥','💫','🧠','🎯'];
  const badEmojis=['🤔','💪','😅','🙈'];
  document.getElementById('fbEmoji').textContent=ok?okEmojis[Math.min(streak-1,6)]||'⭐':badEmojis[0|Math.random()*4];

  const vEl=document.getElementById('fbVerdict');
  vEl.className='fb-verdict '+(isFairAnswer?'verdict-fair':'verdict-unfair');
  vEl.innerHTML=(isFairAnswer?'✅ Bu ADİL bir durum':'❌ Bu ADİL DEĞİL bir durum');

  document.getElementById('fbTitle').textContent=ok
    ?['Harika!','Süpersin!','Bravo!','Adalet Dedektifi!','Tam isabet!'][0|Math.random()*5]
    :['Neredeyse!','Bir daha!','Şaşırtıcı değil mi?'][0|Math.random()*3];
  document.getElementById('fbTitle').className='fb-title '+(ok?'ok':'bad');
  document.getElementById('fbSub').textContent=ok
    ?(pts>10?`+${pts} puan! 🔥 ${streak} doğru seri!`:`+${pts} puan kazandın!`)
    :`Doğru cevap: ${isFairAnswer?'ADİL ✅':'ADİL DEĞİL ❌'}`;
  document.getElementById('fbWhy').textContent=p.why;
  document.getElementById('fbLesson').textContent=p.lesson;
  document.getElementById('nextBtn').textContent=idx>=gamePuzzles.length-1?'🏆 Sonuçları Gör!':'Sıradaki →';
  document.getElementById('fbOverlay').classList.add('show');
}

function nextPuzzle() {
  document.getElementById('fbOverlay').classList.remove('show');
  idx++;
  if(idx>=gamePuzzles.length) showWin();
  else loadPuzzle();
}

function showHint() {
  hintUsed=true;
  document.getElementById('hintText').textContent='💭 '+gamePuzzles[idx].hint;
  document.getElementById('hintBtn').style.display='none';
}

function showWin() {
  document.getElementById('wSc').textContent=score;
  document.getElementById('wCo').textContent=correctCount+'/'+gamePuzzles.length;
  document.getElementById('wSt').textContent=maxStreak;
  document.getElementById('winScreen').classList.add('show');
  fireworksRunning=true; startFireworks(); playWinJingle();
}

/* ══ AUDIO ══ */
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,t,dur,vol=0.2,t0=0){
  const c=getAC(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(vol,c.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t0+dur);
  o.start(c.currentTime+t0);o.stop(c.currentTime+t0+dur+.05);
}
function playCorrect(){tone(523,'sine',.1,.2,0);tone(659,'sine',.1,.2,.12);tone(784,'sine',.25,.22,.24);}
function playWrong()  {tone(300,'sawtooth',.1,.14,0);tone(220,'sawtooth',.18,.14,.12);}
function playWinJingle(){
  [[523,0],[659,.15],[784,.3],[880,.48],[1047,.66],[784,.85],[1047,1.05],[1175,1.25],[1397,1.5]]
    .forEach(([f,s])=>tone(f,'sine',.3,.2,s));
}

/* ══ FIREWORKS ══ */
const fwCanvas=document.getElementById('fw');
const fwCtx=fwCanvas.getContext('2d');
let fwParts=[],fireworksRunning=false,fwTimer;
function resizeFW(){fwCanvas.width=window.innerWidth;fwCanvas.height=window.innerHeight;}
resizeFW();window.addEventListener('resize',resizeFW);
function spawnFW(){
  const x=Math.random()*fwCanvas.width,y=20+Math.random()*fwCanvas.height*.5;
  const cols=['#22c55e','#f43f5e','#a855f7','#fbbf24','#3b82f6','#f97316','#14b8a6'];
  const col=cols[0|Math.random()*cols.length];
  for(let i=0;i<55;i++){
    const a=Math.PI*2/55*i+Math.random()*.2,s=2+Math.random()*5;
    fwParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,alpha:1,color:col,size:1.5+Math.random()*2.5,decay:.013+Math.random()*.01,gravity:.065});
  }
}
function animateFW(){
  if(!fireworksRunning){fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);return;}
  fwCtx.fillStyle='rgba(254,249,240,.12)';fwCtx.fillRect(0,0,fwCanvas.width,fwCanvas.height);
  fwParts=fwParts.filter(p=>p.alpha>.01);
  fwParts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.985;p.alpha-=p.decay;
    fwCtx.save();fwCtx.globalAlpha=p.alpha;fwCtx.fillStyle=p.color;
    fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.size,0,Math.PI*2);fwCtx.fill();fwCtx.restore();
  });
  requestAnimationFrame(animateFW);
}
function startFireworks(){
  fwParts=[];animateFW();
  fwTimer=setInterval(()=>{if(!fireworksRunning){clearInterval(fwTimer);return;}spawnFW();if(Math.random()<.4)spawnFW();},400);
}

startGame();
</script>
