<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ne Yapmalı?</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    background: #fdf6e9;
  }
  #app {
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    position: relative;
  }

  /* ---------- HOME / CATEGORY SCREEN ---------- */
  #home {
    height: 100%; width: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 24px 16px 16px 16px;
    background: linear-gradient(180deg, #fff6e5 0%, #fdf6e9 100%);
    overflow-y: auto;
  }
  #home h1 {
    font-size: 32px; margin: 6px 0 2px 0; color: #4a3b2a;
  }
  #home p.subtitle {
    font-size: 15px; color: #8a7860; margin: 0 0 18px 0; text-align: center;
  }
  .cat-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    width: 100%; max-width: 480px; padding-bottom: 20px;
  }
  .cat-card {
    border-radius: 20px; padding: 16px 10px; text-align: center;
    color: white; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.12);
    transition: transform 0.08s ease;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .cat-card:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  .cat-card .emoji { font-size: 38px; }
  .cat-card .name { font-size: 15.5px; font-weight: 700; }
  .cat-card .progress { font-size: 11.5px; opacity: 0.9; }

  /* ---------- SCENARIO SCREEN ---------- */
  #scene {
    height: 100%; width: 100%;
    display: none;
    flex-direction: column;
    padding: 18px 18px 24px 18px;
  }
  #scene.active { display: flex; }
  .scene-topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; gap: 6px;
  }
  .back-btn {
    font-size: 14px; color: #7a6a55; padding: 8px 12px; border-radius: 14px;
    background: rgba(0,0,0,0.06); cursor: pointer; white-space: nowrap;
  }
  .cat-label {
    font-size: 14px; font-weight: 700; color: #6a5a45; text-align: center; flex: 1;
  }
  .dots { display: flex; gap: 4px; flex-wrap: wrap; max-width: 90px; justify-content: flex-end; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; background: rgba(0,0,0,0.14);
  }
  .dot.done { background: #f4a940; }

  .scenario-box {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center; gap: 16px; padding: 0 4px;
    overflow-y: auto;
  }
  .scenario-emoji { font-size: 52px; }
  .scenario-text {
    font-size: 20px; line-height: 1.42; color: #3d3226; font-weight: 600;
    max-width: 480px;
  }
  .scenario-question {
    font-size: 16px; color: #a3823f; font-weight: 700;
  }

  .options {
    display: flex; flex-direction: column; gap: 11px; width: 100%; max-width: 480px;
    margin: 0 auto;
  }
  .option-btn {
    font-size: 16px; font-weight: 600; color: #4a3b2a;
    background: white; border: 2px solid #eadfc8; border-radius: 18px;
    padding: 13px 15px; text-align: left; cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.06);
  }
  .option-btn:active { transform: translateY(2px); }
  .option-btn.selected.tier1 { background: #eafaf0; border-color: #7ed49a; }
  .option-btn.selected.tier2 { background: #eef6fb; border-color: #86c0e6; }
  .option-btn.selected.tier3 { background: #fff8ec; border-color: #f0cf8a; }
  .option-btn.dim { opacity: 0.45; pointer-events: none; }

  .feedback-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: white; border-radius: 26px 26px 0 0;
    box-shadow: 0 -6px 24px rgba(0,0,0,0.12);
    padding: 20px 20px 28px 20px;
    display: none; flex-direction: column; align-items: center; text-align: center; gap: 9px;
    transform: translateY(100%);
    transition: transform 0.28s ease;
    max-height: 55%;
    overflow-y: auto;
  }
  .feedback-overlay.show { display: flex; transform: translateY(0); }
  .feedback-emoji { font-size: 40px; }
  .feedback-title { font-size: 18px; font-weight: 700; color: #3d3226; }
  .feedback-text { font-size: 15.5px; color: #6a5a45; line-height: 1.4; max-width: 460px; }
  .tap-hint { font-size: 12.5px; color: #b5a688; margin-top: 4px; }

  /* ---------- CATEGORY COMPLETE SCREEN ---------- */
  #complete {
    height: 100%; width: 100%; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 14px;
  }
  #complete.active { display: flex; }
  #complete .big-emoji { font-size: 56px; }
  #complete h2 { font-size: 22px; color: #4a3b2a; margin: 0; }
  #complete p { font-size: 15.5px; color: #8a7860; max-width: 420px; }
  .complete-btn {
    margin-top: 10px; font-size: 16px; font-weight: 700; color: white;
    background: #f4a940; border-radius: 18px; padding: 14px 26px; cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
  }
</style>
</head>

    <div class="feedback-overlay" id="feedbackOverlay">

      <div class="feedback-text" id="feedbackText"></div>

    </div>
  </div>

  <div id="complete">

    <p id="completeSummary"></p>

</div>

/* ================= STATE ================= */
let currentCatIndex = null;
let currentSceneIndex = 0;
let tierCounts = {1:0, 2:0, 3:0};
let waitingForTap = false;

const STORAGE_KEY = "ne_yapmali_progress_v2";

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function saveProgress(progress) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
}

/* ================= HOME SCREEN ================= */
function renderHome() {
  const grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  const progress = loadProgress();
  categories.forEach((cat, i) => {
    const done = progress[cat.id] && progress[cat.id].completed;
    const card = document.createElement("div");
    card.className = "cat-card";
    card.style.background = cat.color;
    card.innerHTML =
      '<div class="emoji">' + cat.emoji + '</div>' +
      '<div class="name">' + cat.name + '</div>' +
      '<div class="progress">' + (done ? "Tamamlandı ✓" : cat.scenarios.length + " durum") + '</div>';
    card.addEventListener("click", () => openCategory(i));
    grid.appendChild(card);
  });
}

/* ================= SCENE SCREEN ================= */
function openCategory(index) {
  currentCatIndex = index;
  currentSceneIndex = 0;
  tierCounts = {1:0, 2:0, 3:0};
  document.getElementById("home").style.display = "none";
  document.getElementById("complete").classList.remove("active");
  document.getElementById("scene").classList.add("active");
  document.getElementById("catLabel").textContent = categories[index].name;
  renderDots();
  renderScenario();
}

function renderDots() {
  const cat = categories[currentCatIndex];
  const dotsEl = document.getElementById("dots");
  dotsEl.innerHTML = "";
  for (let i = 0; i < cat.scenarios.length; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i < currentSceneIndex ? " done" : "");
    dotsEl.appendChild(d);
  }
}

function renderScenario() {
  const cat = categories[currentCatIndex];
  const scenario = cat.scenarios[currentSceneIndex];
  document.getElementById("scenarioEmoji").textContent = scenario.emoji;
  document.getElementById("scenarioText").textContent = scenario.text;
  const optionsBox = document.getElementById("optionsBox");
  optionsBox.innerHTML = "";
  waitingForTap = false;
  document.getElementById("feedbackOverlay").classList.remove("show");

  scenario.options.forEach((opt, idx) => {
    const btn = document.createElement("div");
    btn.className = "option-btn";
    btn.textContent = opt.text;
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      selectOption(opt, idx);
    });
    optionsBox.appendChild(btn);
  });
  renderDots();
}

function selectOption(opt, idx) {
  if (waitingForTap) return;
  waitingForTap = true;
  tierCounts[opt.tier]++;

  const allBtns = document.querySelectorAll(".option-btn");
  allBtns.forEach((b, i) => {
    if (i === idx) {
      b.classList.add("selected", "tier" + opt.tier);
    } else {
      b.classList.add("dim");
    }
  });

  const emojiMap = {1:"🌟", 2:"👍", 3:"💛"};
  const titleMap = {1:"Harika seçim!", 2:"Güzel bir seçim!", 3:"Bunu birlikte düşünelim"};
  document.getElementById("feedbackEmoji").textContent = emojiMap[opt.tier];
  document.getElementById("feedbackTitle").textContent = titleMap[opt.tier];
  document.getElementById("feedbackText").textContent = opt.feedback;
  document.getElementById("feedbackOverlay").classList.add("show");
}

function goToNext() {
  if (!waitingForTap) return;
  waitingForTap = false;
  const cat = categories[currentCatIndex];
  currentSceneIndex++;
  if (currentSceneIndex >= cat.scenarios.length) {
    finishCategory();
  } else {
    renderScenario();
  }
}

function finishCategory() {
  const cat = categories[currentCatIndex];
  const progress = loadProgress();
  progress[cat.id] = { completed: true };
  saveProgress(progress);

  document.getElementById("scene").classList.remove("active");
  document.getElementById("complete").classList.add("active");
  document.getElementById("completeTitle").textContent = cat.name + " bölümünü tamamladın!";
  document.getElementById("completeSummary").textContent =
    "En iyi seçim: " + tierCounts[1] + " kere, iyi seçim: " + tierCounts[2] + " kere. Harika düşündün! 💛";
}

/* ================= NAVIGATION ================= */
document.getElementById("backBtn").addEventListener("click", () => {
  document.getElementById("scene").classList.remove("active");
  document.getElementById("home").style.display = "flex";
  renderHome();
});

document.getElementById("completeBtn").addEventListener("click", () => {
  document.getElementById("complete").classList.remove("active");
  document.getElementById("home").style.display = "flex";
  renderHome();
});

// Tap anywhere on the scene (outside option buttons before selection) advances after feedback shown
document.getElementById("scene").addEventListener("click", () => {
  goToNext();
});

/* ================= INIT ================= */
renderHome();
</script>
