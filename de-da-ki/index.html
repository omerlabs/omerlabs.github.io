<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De/Da · Ki — Yazım Alıştırması</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222638;
    --border: #2e3248;
    --text: #e8eaf6;
    --text-dim: #7b82b0;
    --accent: #7c6af7;
    --accent-glow: rgba(124,106,247,0.25);
    --correct: #34d399;
    --correct-glow: rgba(52,211,153,0.2);
    --wrong: #f87171;
    --wrong-glow: rgba(248,113,113,0.2);
    --highlight: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(52,211,153,0.05) 0%, transparent 60%);
  }

  #app {
    width: 100%;
    max-width: 780px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header h1 span {
    color: var(--accent);
  }
  .header p {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .stat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .stat-dot.correct { background: var(--correct); }
  .stat-dot.wrong { background: var(--wrong); }
  .stat-num { font-size: 1rem; }
  .stat-num.correct { color: var(--correct); }
  .stat-num.wrong { color: var(--wrong); }

  .progress-wrap {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .soru-no {
    font-size: 0.85rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-weight: 700;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 44px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #a78bfa, var(--correct));
    opacity: 0.6;
  }

  .konu-badge {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 24px;
  }
  .konu-badge.deda {
    background: rgba(124,106,247,0.15);
    color: #a78bfa;
    border: 1px solid rgba(124,106,247,0.3);
  }
  .konu-badge.ki {
    background: rgba(251,191,36,0.12);
    color: #fbbf24;
    border: 1px solid rgba(251,191,36,0.25);
  }

  .cumle {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 36px;
  }
  .cumle .vurgu {
    color: var(--highlight);
    text-decoration: underline;
    text-decoration-style: wavy;
    text-underline-offset: 4px;
    text-decoration-color: rgba(251,191,36,0.5);
  }

  /* BUTTONS */
  .butonlar {
    display: flex;
    gap: 14px;
  }
  .btn {
    flex: 1;
    padding: 16px 20px;
    border-radius: 14px;
    border: 2px solid transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-dogru {
    background: rgba(52,211,153,0.1);
    border-color: rgba(52,211,153,0.3);
    color: var(--correct);
  }
  .btn-dogru:hover {
    background: rgba(52,211,153,0.2);
    border-color: var(--correct);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--correct-glow);
  }
  .btn-yanlis {
    background: rgba(248,113,113,0.1);
    border-color: rgba(248,113,113,0.3);
    color: var(--wrong);
  }
  .btn-yanlis:hover {
    background: rgba(248,113,113,0.2);
    border-color: var(--wrong);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--wrong-glow);
  }
  .btn:disabled {
    cursor: default;
    transform: none !important;
    box-shadow: none !important;
    opacity: 0.5;
  }
  .btn.secildi-dogru {
    background: rgba(52,211,153,0.25) !important;
    border-color: var(--correct) !important;
    opacity: 1 !important;
  }
  .btn.secildi-yanlis {
    background: rgba(248,113,113,0.25) !important;
    border-color: var(--wrong) !important;
    opacity: 1 !important;
  }

  /* FEEDBACK */
  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    display: none;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.25s ease;
  }
  .feedback.show { display: flex; }
  .feedback.dogru-fb {
    background: var(--correct-glow);
    border: 1px solid rgba(52,211,153,0.3);
    color: var(--correct);
  }
  .feedback.yanlis-fb {
    background: var(--wrong-glow);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--wrong);
  }
  .feedback .dogru-yazim {
    color: var(--text);
    font-weight: 800;
  }

  /* NEXT BUTTON */
  .btn-next {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    background: var(--accent);
    border: none;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    display: none;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .btn-next:hover {
    background: #6c5ce7;
    transform: translateY(-1px);
    box-shadow: 0 8px 28px var(--accent-glow);
  }
  .btn-next.show { display: block; animation: fadeIn 0.25s ease; }

  /* SCORE SCREEN */
  #score-screen {
    display: none;
    text-align: center;
    padding: 60px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
  }
  #score-screen.show { display: block; animation: fadeIn 0.3s ease; }
  .score-emoji { font-size: 4rem; margin-bottom: 16px; }
  .score-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
  .score-puan {
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--accent);
    margin: 20px 0;
  }
  .score-detay {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 32px;
  }
  .score-detay span { color: var(--text); font-weight: 700; }
  .btn-tekrar {
    padding: 16px 40px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .btn-tekrar:hover { background: #6c5ce7; transform: translateY(-2px); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-anim { animation: fadeIn 0.3s ease; }
</style>
</head>

  <div id="score-screen">

let karisik = [];
let mevcut = 0;
let dogru = 0;
let yanlis = 0;
let cevapVerildi = false;

function karistir(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function baslat() {
  karisik = karistir(sorular);
  mevcut = 0; dogru = 0; yanlis = 0; cevapVerildi = false;
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  gosterSoru();
}

function gosterSoru() {
  cevapVerildi = false;
  const s = karisik[mevcut];
  const toplam = karisik.length;

  // Badge
  const badge = document.getElementById('konu-badge');
  badge.textContent = s.konu === 'deda' ? 'DE / DA' : 'Kİ';
  badge.className = 'konu-badge ' + s.konu;

  // Cümle — vurguyu bul ve renklendir
  const cumleEl = document.getElementById('cumle-text');
  // vurguyu cümlede bul (case-sensitive)
  const idx = s.cumle.indexOf(s.vurgu);
  if (idx === -1) {
    cumleEl.innerHTML = s.cumle;
  } else {
    const once = s.cumle.substring(0, idx);
    const sonra = s.cumle.substring(idx + s.vurgu.length);
    cumleEl.innerHTML = once + '<span class="vurgu">' + s.vurgu + '</span>' + sonra;
  }

  // Feedback temizle
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  // Butonlar
  const btnD = document.getElementById('btn-dogru');
  const btnY = document.getElementById('btn-yanlis');
  btnD.disabled = false; btnY.disabled = false;
  btnD.className = 'btn btn-dogru';
  btnY.className = 'btn btn-yanlis';

  // Next gizle
  document.getElementById('btn-next').className = 'btn-next';

  // İlerleme
  const yuzde = (mevcut / toplam) * 100;
  document.getElementById('progress-bar').style.width = yuzde + '%';
  document.getElementById('soru-no').textContent = (mevcut + 1) + ' / ' + toplam;
  document.getElementById('dogru-sayac').textContent = dogru;
  document.getElementById('yanlis-sayac').textContent = yanlis;

  // Kart animasyonu
  const card = document.getElementById('soru-card');
  card.classList.remove('card-anim');
  void card.offsetWidth;
  card.classList.add('card-anim');
}

function cevapla(kullaniciBuDogru) {
  if (cevapVerildi) return;
  cevapVerildi = true;
  const s = karisik[mevcut];
  const dogruCevap = s.dogru;
  const tamam = (kullaniciBuDogru === dogruCevap);

  const btnD = document.getElementById('btn-dogru');
  const btnY = document.getElementById('btn-yanlis');
  btnD.disabled = true;
  btnY.disabled = true;

  const fb = document.getElementById('feedback');

  if (tamam) {
    dogru++;
    if (kullaniciBuDogru) {
      btnD.classList.add('secildi-dogru');
    } else {
      btnY.classList.add('secildi-dogru');
    }
    fb.className = 'feedback dogru-fb show';
    const dw = s.dogru_yazim || s.vurgu;
    fb.innerHTML = '✓ Doğru! Yazım: <span class="dogru-yazim">' + dw + '</span>';
  } else {
    yanlis++;
    if (kullaniciBuDogru) {
      btnD.classList.add('secildi-yanlis');
    } else {
      btnY.classList.add('secildi-yanlis');
    }
    fb.className = 'feedback yanlis-fb show';
    const dw = s.dogru_yazim || s.vurgu;
    fb.innerHTML = '✗ Yanlış. Doğru yazım: <span class="dogru-yazim">' + dw + '</span>';
  }

  document.getElementById('dogru-sayac').textContent = dogru;
  document.getElementById('yanlis-sayac').textContent = yanlis;
  document.getElementById('btn-next').className = 'btn-next show';
}

function sonrakiSoru() {
  mevcut++;
  if (mevcut >= karisik.length) {
    gosterSonuc();
  } else {
    gosterSoru();
  }
}

function gosterSonuc() {
  document.getElementById('quiz-area').style.display = 'none';
  const sc = document.getElementById('score-screen');
  sc.classList.add('show');
  const toplam = karisik.length;
  const yuzde = Math.round((dogru / toplam) * 100);

  let emoji = '😔';
  let title = 'Daha fazla pratik gerekiyor.';
  if (yuzde >= 90) { emoji = '🏆'; title = 'Mükemmel! Gerçek bir dil ustası!'; }
  else if (yuzde >= 75) { emoji = '🎉'; title = 'Harika! Çok iyi gidiyorsun!'; }
  else if (yuzde >= 55) { emoji = '👍'; title = 'İyi! Biraz daha pratik yap.'; }

  document.getElementById('score-emoji').textContent = emoji;
  document.getElementById('score-title').textContent = title;
  document.getElementById('score-puan').textContent = dogru + ' / ' + toplam;
  document.getElementById('score-detay').innerHTML =
    '<span>' + yuzde + '%</span> başarı oranı — <span>' + dogru + '</span> doğru, <span>' + yanlis + '</span> yanlış';
}

// Başlat
baslat();
